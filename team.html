<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>F1 Bolão — Team Detail</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
:root {
  --red:#e10600; --red-dim:#ffb4a8; --red-faint:rgba(225,6,0,0.08);
  --blue:#a6c8ff; --blue-bright:#3192fc;
  --green:#4ade80; --green-faint:rgba(74,222,128,0.1);
  --amber:#f59e0b;
  --surface:#131313; --surface-low:#1c1b1b; --surface-mid:#201f1f;
  --surface-high:#2a2a2a; --surface-highest:#353534;
  --on:#e5e2e1;
  --on-60:rgba(229,226,225,0.6); --on-40:rgba(229,226,225,0.4);
  --on-20:rgba(229,226,225,0.2); --on-08:rgba(229,226,225,0.08);
  --outline:#af8781;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--surface);color:var(--on);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
body{min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;font-family:'Material Symbols Outlined';vertical-align:middle}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:50;background:var(--surface);box-shadow:0 20px 40px rgba(0,0,0,0.3)}
.topbar-inner{display:flex;justify-content:space-between;align-items:center;height:56px;padding:0 16px}
.back-btn{background:none;border:none;cursor:pointer;color:var(--on-40);padding:6px;display:flex;align-items:center;gap:8px;font-size:0.75rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase}
.back-btn:hover{color:var(--on)}
.topbar-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1rem;letter-spacing:-0.02em;color:var(--red);text-transform:uppercase}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--on-40);padding:6px;display:flex;align-items:center}

main{flex:1;padding-bottom:80px}

/* portrait/landscape toggle */
.portrait-only{display:block}
.landscape-only{display:none}
@media(orientation:landscape) and (max-height:500px){
  .portrait-only{display:none!important}
  .landscape-only{display:flex!important}
  main{padding-bottom:0}
  .bottom-nav{display:none}
  .topbar{position:relative}
}

/* ── PROFILE HEADER ── */
.profile{position:relative;overflow:hidden;border-left:3px solid var(--red);background:var(--surface-low);padding:20px 20px 22px}
.profile-bg{position:absolute;right:-10px;top:-10px;font-family:'Space Grotesk',sans-serif;font-size:8rem;font-weight:900;font-style:italic;color:var(--on);opacity:0.03;line-height:1;pointer-events:none;user-select:none}
.tier-badge{display:inline-block;background:var(--red);color:#fff;font-size:0.55rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;font-style:italic;padding:2px 8px;margin-bottom:10px}
.tier-badge.mid{background:var(--blue-bright)}
.tier-badge.back{background:var(--surface-highest);color:var(--on-40)}
.profile-rank-badge{background:var(--on-08);color:var(--blue);font-size:0.55rem;font-weight:900;letter-spacing:0.16em;text-transform:uppercase;padding:2px 8px;margin-left:6px}
.profile-name{font-family:'Space Grotesk',sans-serif;font-size:2.2rem;font-weight:900;text-transform:uppercase;letter-spacing:-0.03em;line-height:1}
.profile-team{font-size:0.65rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--blue);margin-top:6px}

/* ── METRICS GRID ── */
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:2px;padding:2px 16px 0}
@media(min-width:400px){.metrics{grid-template-columns:repeat(4,1fr)}}
.metric-card{background:var(--surface-high);padding:12px 14px}
.metric-card.red{border-left:2px solid var(--red)}
.metric-card.blue{border-left:2px solid var(--blue)}
.metric-card.green{border-left:2px solid var(--green)}
.metric-label{font-size:0.48rem;font-weight:900;letter-spacing:0.16em;text-transform:uppercase;color:var(--on-40);margin-bottom:3px}
.metric-val{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:700;line-height:1}
.metric-val.green{color:var(--green)}
.metric-val.blue{color:var(--blue)}

/* ── CHARTS ── */
.charts-section{padding:16px}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.chart-card{background:var(--surface-low);padding:14px}
.chart-header{border-left:2px solid var(--blue);padding-left:8px;margin-bottom:12px}
.chart-header.red{border-left-color:var(--red)}
.chart-header.green{border-left-color:var(--green)}
.chart-title{font-size:0.6rem;font-weight:900;letter-spacing:0.16em;text-transform:uppercase;color:var(--on)}
.chart-sub{font-size:0.5rem;font-weight:600;color:var(--on-40);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px}
.chart-svg{width:100%;display:block;overflow:visible}

/* ── CARDS SECTION ── */
.cards-section{padding:0 16px 16px}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.section-accent{width:3px;height:18px;flex-shrink:0}
.section-accent.red{background:var(--red)}
.section-accent.blue{background:var(--blue)}
.section-title{font-family:'Space Grotesk',sans-serif;font-size:0.9rem;font-weight:700;text-transform:uppercase}
.section-sub{font-size:0.5rem;font-weight:700;color:var(--on-40);letter-spacing:0.12em;text-transform:uppercase;margin-left:auto}
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
@media(min-width:400px){.cards-grid{grid-template-columns:repeat(6,1fr)}}
.card-chip{background:var(--surface-high);padding:8px 6px;display:flex;align-items:center;gap:5px}
.card-chip.used{border-left:2px solid var(--green);background:var(--green-faint)}
.card-icon{font-size:0.85rem}
.card-icon.used{color:var(--green)}
.card-icon.unused{color:var(--on-20)}
.card-name{font-size:0.52rem;font-weight:800;text-transform:uppercase;letter-spacing:0.06em}
.card-name.used{color:var(--on)}
.card-name.unused{color:var(--on-40)}

/* ── DRIVER LINEUP ── */
.lineup-section{padding:0 16px 16px}
.hero-drivers{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:4px}
.hero-card{background:var(--surface-low);position:relative;overflow:hidden;height:140px;cursor:pointer}
.hero-card.captain{border:2px solid var(--red)}
.hero-card.megacap{border:2px solid var(--blue)}
.hero-portrait{position:absolute;left:0;top:0;height:100%;width:55%;object-fit:cover;object-position:top;filter:grayscale(100%);transition:filter 0.5s,transform 0.5s;transform:scale(1.05)}
.hero-card:hover .hero-portrait{filter:grayscale(0%);transform:scale(1)}
.hero-gradient{position:absolute;left:0;top:0;width:100%;height:100%;background:linear-gradient(to right,transparent 35%,var(--surface-low) 65%)}
.hero-badge{position:absolute;top:6px;left:6px;font-size:0.44rem;font-weight:900;letter-spacing:0.12em;text-transform:uppercase;padding:2px 6px;z-index:2}
.hero-badge.captain{background:var(--red);color:#fff}
.hero-badge.megacap{background:var(--blue);color:#000}
.hero-badge.new-pick{background:var(--amber);color:#000;top:6px;left:auto;right:6px}
.hero-info{position:absolute;right:0;top:0;width:50%;height:100%;display:flex;flex-direction:column;justify-content:center;padding:10px;z-index:1}
.hero-driver-name{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:900;text-transform:uppercase;letter-spacing:-0.02em;line-height:1}
.hero-price{font-size:0.52rem;font-weight:700;color:var(--blue);margin-top:3px;letter-spacing:0.08em}
.hero-pts{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:700;line-height:1;margin-top:auto}
.hero-pts.neg{color:var(--red-dim)}
.hero-pts-label{font-size:0.45rem;font-weight:900;letter-spacing:0.12em;text-transform:uppercase;color:var(--on-40)}

/* compact drivers row */
.compact-drivers{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:4px}
.compact-card{background:var(--surface-low);overflow:hidden;position:relative}
.compact-portrait{width:100%;aspect-ratio:1;object-fit:cover;object-position:top;filter:grayscale(100%);transition:filter 0.4s;display:block}
.compact-card:hover .compact-portrait{filter:grayscale(0%)}
.compact-new-badge{position:absolute;top:4px;right:4px;background:var(--amber);color:#000;font-size:0.4rem;font-weight:900;letter-spacing:0.08em;padding:1px 4px;text-transform:uppercase}
.compact-info{padding:6px 8px}
.compact-name{font-family:'Space Grotesk',sans-serif;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.compact-price{font-size:0.46rem;font-weight:700;color:var(--blue);letter-spacing:0.06em;margin-top:1px}
.compact-bottom{display:flex;justify-content:space-between;align-items:baseline;margin-top:4px}
.compact-pts-label{font-size:0.42rem;font-weight:700;text-transform:uppercase;color:var(--on-40)}
.compact-pts{font-family:'Space Grotesk',sans-serif;font-size:0.85rem;font-weight:700}
.compact-pts.neg{color:var(--red-dim)}

/* constructors */
.constructors-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.con-card{background:var(--surface-low);overflow:hidden;position:relative;border-top:2px solid var(--red);cursor:pointer}
.con-card.second{border-top-color:var(--blue)}
.con-car-wrap{width:100%;padding:12px 8px;background:var(--surface-high);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.con-car-img{width:100%;max-width:220px;height:auto;object-fit:contain;display:block;margin:0 auto;transition:transform 0.4s}
.con-card:hover .con-car-img{transform:scale(1.04)}
.con-new-badge{position:absolute;top:4px;right:4px;background:var(--amber);color:#000;font-size:0.4rem;font-weight:900;letter-spacing:0.08em;padding:1px 4px;text-transform:uppercase}
.con-info{display:flex;justify-content:space-between;align-items:center;padding:8px 10px}
.con-name{font-family:'Space Grotesk',sans-serif;font-size:0.85rem;font-weight:700;text-transform:uppercase}
.con-right{text-align:right}
.con-price{font-size:0.48rem;font-weight:700;color:var(--blue);letter-spacing:0.06em}
.con-pts{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700}

/* ── LANDSCAPE ── */
.landscape-wrap{display:none;flex-direction:row;height:calc(100dvh - 56px);overflow:hidden}
.landscape-sidebar{width:200px;flex-shrink:0;background:var(--surface-low);display:flex;flex-direction:column;border-right:1px solid var(--on-08)}
.landscape-main{flex:1;overflow-y:auto;padding:16px}

.ls-profile{padding:14px 14px 12px;border-bottom:1px solid var(--on-08);border-left:3px solid var(--red)}
.ls-name{font-family:'Space Grotesk',sans-serif;font-size:0.9rem;font-weight:700;text-transform:uppercase;letter-spacing:-0.02em}
.ls-team{font-size:0.52rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--blue);margin-top:3px}
.ls-rank{font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:900;color:var(--red);line-height:1;margin-top:8px}
.ls-rank-label{font-size:0.46rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;color:var(--on-40)}

.ls-stats{display:flex;flex-direction:column;gap:0;flex:1;overflow-y:auto}
.ls-stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid var(--on-08)}
.ls-stat-label{font-size:0.5rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:var(--on-40)}
.ls-stat-val{font-family:'Space Grotesk',sans-serif;font-size:0.85rem;font-weight:700}
.ls-stat-val.green{color:var(--green)}
.ls-stat-val.blue{color:var(--blue)}

.ls-main-title{font-family:'Space Grotesk',sans-serif;font-size:0.75rem;font-weight:700;text-transform:uppercase;color:var(--on-60);margin-bottom:12px}
.ls-charts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.ls-chart-card{background:var(--surface-low);padding:10px}

/* rank progression table */
.rank-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.rank-table th{font-size:0.48rem;font-weight:900;letter-spacing:0.12em;text-transform:uppercase;color:var(--on-40);padding:5px 10px;text-align:left;border-bottom:1px solid var(--on-08)}
.rank-table td{padding:8px 10px;border-bottom:1px solid var(--on-08)}
.rank-table tr:last-child td{border-bottom:none}
.rank-table tr:hover td{background:var(--surface-high)}
.rank-num{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700}
.rank-pts{font-family:'Space Grotesk',sans-serif;font-size:0.9rem;font-weight:700;text-align:right}
.rank-prize{font-size:0.65rem;font-weight:700;color:var(--green);text-align:right}
.rank-budget{font-size:0.65rem;font-weight:600;color:var(--blue);text-align:right}
.delta-up{color:var(--green);font-size:0.6rem;font-weight:800}
.delta-dn{color:var(--red-dim);font-size:0.6rem;font-weight:800}
.delta-flat{color:var(--on-40);font-size:0.6rem;font-weight:800}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--surface);box-shadow:0 -10px 40px rgba(0,0,0,0.25);display:flex;height:60px;border-top:1px solid var(--on-08)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;text-decoration:none;color:rgba(166,200,255,0.35);font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.15s;background:none;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
.nav-item.active{color:var(--red);border-top:2px solid var(--red);background:var(--surface-low)}
.nav-item .material-symbols-outlined{font-size:1.3rem}
.nav-item.active .material-symbols-outlined{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
</style>
</head>
<body>

<div id="loading-overlay" style="position:fixed;inset:0;background:#131313;z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px">
  <div style="font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:900;color:#e10600;letter-spacing:-0.02em;text-transform:uppercase">F1 Bolão</div>
  <div style="width:40px;height:2px;background:#2a2a2a;position:relative;overflow:hidden">
    <div style="position:absolute;top:0;left:-100%;width:100%;height:100%;background:#e10600;animation:loadSlide 1s ease infinite"></div>
  </div>
  <style>@keyframes loadSlide{0%{left:-100%}100%{left:100%}}</style>
</div>
<header class="topbar">
  <div class="topbar-inner">
    <button class="back-btn" onclick="history.back()">
      <span class="material-symbols-outlined">arrow_back</span>
      <span>Back</span>
    </button>
    <div class="topbar-title">Team Detail</div>
    <button class="icon-btn"><span class="material-symbols-outlined">settings</span></button>
  </div>
</header>

<!-- LANDSCAPE LAYOUT -->
<div class="landscape-wrap landscape-only" id="landscape-wrap">
  <div class="landscape-sidebar">
    <div class="ls-profile" id="ls-profile"></div>
    <div class="ls-stats" id="ls-stats"></div>
  </div>
  <div class="landscape-main">
    <div class="ls-main-title" id="ls-main-title">Season Performance</div>
    <div class="ls-charts-grid" id="ls-charts-grid"></div>
    <div id="ls-rank-table"></div>
  </div>
</div>

<!-- PORTRAIT LAYOUT -->
<main class="portrait-only">
  <!-- Profile -->
  <div class="profile" id="profile" style="margin:16px 16px 4px">
    <div class="profile-bg" id="profile-bg"></div>
    <div>
      <span class="tier-badge" id="tier-badge"></span>
      <span class="profile-rank-badge" id="rank-badge"></span>
    </div>
    <div class="profile-name" id="profile-name"></div>
    <div class="profile-team" id="profile-team"></div>
  </div>

  <!-- Metrics -->
  <div class="metrics" id="metrics"></div>

  <!-- Charts -->
  <div class="charts-section">
    <div class="charts-grid" id="charts-grid"></div>
  </div>

  <!-- Strategy Cards -->
  <div class="cards-section">
    <div class="section-header">
      <div class="section-accent blue"></div>
      <div class="section-title">Strategy Cards</div>
      <div class="section-sub" id="cards-used-count"></div>
    </div>
    <div class="cards-grid" id="cards-grid"></div>

  <!-- Driver Lineup -->
  <div class="lineup-section">

    <div class="section-header" style="margin-top:12px">
      <div class="section-accent red"></div>
      <div class="section-title">Constructors</div>
    </div>
    <div class="constructors-grid" id="constructors-grid"></div>
  </div>
</main>

<nav class="bottom-nav portrait-only">
  <a class="nav-item active" href="index.html"><span class="material-symbols-outlined">leaderboard</span><span>Standings</span></a>
  <a class="nav-item" href="results.html"><span class="material-symbols-outlined">flag</span><span>Results</span></a>

<script>
let DRIVER_SLUG = {};
let CON_SLUG = {};
let ALL_CARDS = [];

function cleanCard(c) { return c.replace(/\s*\(GD\d\)/,'').trim(); }
function driverImg(name) {
  const slug = DRIVER_SLUG[name] || name.toLowerCase().replace(/ /g,'_');
  return 'images/portraits/' + slug + '.png';
}
function carImg(name) {
  const slug = CON_SLUG[name] || name.toLowerCase().replace(/ f1 team/i,'').replace(/ /g,'_').replace(/_+$/,'');
  return 'images/cars/' + slug + '.webp';
}

function buildData(results, picks, prices) {
  const maxRace = Math.max(...results.map(r=>r.race_number));
  const users = [...new Set(results.map(r=>r.user_name))].sort();
  const latestPrices = {};
  prices.filter(p=>p.race_number===maxRace).forEach(p=>latestPrices[p.player_name]=p.price_next_race);

  const DATA = {};
  users.forEach(user => {
    const userResults = results.filter(r=>r.user_name===user).sort((a,b)=>a.race_number-b.race_number);
    if (!userResults.length) return;
    const latest = userResults[userResults.length-1];

    // Cards used
    const cardsUsed = new Set();
    userResults.forEach(r => { if(r.cards_used) r.cards_used.split(',').forEach(c=>cardsUsed.add(cleanCard(c))); });

    // Total prize
    const totalPrize = Math.round(userResults.reduce((s,r)=>s+(r.race_prize||0),0)*100)/100;

    // Latest picks
    const latestPicks = picks.filter(p=>p.user_name===user&&p.race_number===maxRace);
    const prevPicks = new Set(picks.filter(p=>p.user_name===user&&p.race_number===maxRace-1).map(p=>p.pick_name));

    // Dedup picks by name
    const seenPicks = new Set();
    const uniquePicks = latestPicks.filter(p=>{ if(seenPicks.has(p.pick_name)) return false; seenPicks.add(p.pick_name); return true; });

    uniquePicks.sort((a,b)=>{
      const rank = p => p.is_megacap?0:p.is_captain?1:p.pick_type==='Driver'?2:3;
      return rank(a)-rank(b);
    });

    DATA[user] = {
      user_name: user,
      team_name: latest.team_name,
      season_rank: latest.season_rank,
      season_points: latest.season_points,
      race_number: latest.race_number,
      new_budget: latest.new_budget,
      total_prize: totalPrize,
      cards_used: [...cardsUsed].sort(),
      picks: uniquePicks.map(p=>({
        name: p.pick_name, type: p.pick_type,
        pts: p.pick_points_gd, is_captain: p.is_captain, is_megacap: p.is_megacap,
        is_new: !prevPicks.has(p.pick_name),
        img: p.pick_type==='Driver' ? driverImg(p.pick_name) : carImg(p.pick_name),
        price: latestPrices[p.pick_name] || null,
      })),
      rank_history: userResults.map(r=>({
        race: r.race_number, race_name: r.race_name, race_flag: r.race_flag,
        season_rank: r.season_rank, race_rank: r.race_rank,
        race_points: r.race_points, new_budget: r.new_budget,
        race_prize: r.race_prize||0,
      })),
    };
  });
  return DATA;
}

async function init() {
  try {
    const [results, picks, prices, config] = await Promise.all([
      fetch('results.json').then(r=>r.json()),
      fetch('picks.json').then(r=>r.json()),
      fetch('prices.json').then(r=>r.json()),
      fetch('config.json').then(r=>r.json()),
    ]);
    DRIVER_SLUG = config.driver_slug_overrides || {};
    CON_SLUG    = config.constructor_slug_overrides || {};

function tierInfo(rank) {
  if (rank <= 3) return { label: 'Podium Tier', cls: '' };
  if (rank <= 7) return { label: 'Mid Tier', cls: 'mid' };
  return { label: 'Backmarker', cls: 'back' };
}

function rankDelta(history, idx) {
  if (idx === 0) return null;
  const prev = history[idx-1].season_rank, curr = history[idx].season_rank;
  if (curr < prev) return { dir: 'up', n: prev - curr };
  if (curr > prev) return { dir: 'dn', n: curr - prev };
  return { dir: 'flat', n: 0 };
}

// ── SVG CHART HELPERS ─────────────────────────────────────────────────────
function miniLineChart(data, color, W=200, H=60) {
  if (data.length < 2) return `<svg viewBox="0 0 ${W} ${H}" class="chart-svg"></svg>`;
  const mn = Math.min(...data), mx = Math.max(...data);
  const range = mx - mn || 1;
  const pts = data.map((v, i) => {
    const x = (i / (data.length-1)) * (W-4) + 2;
    const y = H - 8 - ((v - mn) / range) * (H - 16);
    return [x, y];
  });
  const path = pts.map((p,i) => `${i===0?'M':'L'}${p[0]},${p[1]}`).join(' ');
  const area = `M${pts[0][0]},${H} ` + pts.map(p=>`L${p[0]},${p[1]}`).join(' ') + ` L${pts[pts.length-1][0]},${H} Z`;
  const dots = pts.map(p => `<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="${color}"/>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" class="chart-svg">
    <defs><linearGradient id="g${color.replace('#','')}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#g${color.replace('#','')})" />
    <path d="${path}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
  </svg>`;
}

function miniBarChart(data, color, W=200, H=60) {
  if (!data.length) return '';
  const mx = Math.max(...data, 1);
  const bw = (W - 8) / data.length - 3;
  const bars = data.map((v,i) => {
    const bh = Math.max(2, ((v / mx) * (H - 12)));
    const x = 4 + i * ((W-8)/data.length);
    const y = H - 4 - bh;
    return `<rect x="${x}" y="${y}" width="${bw}" height="${bh}" fill="${color}" rx="1"/>`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" class="chart-svg">${bars}</svg>`;
}

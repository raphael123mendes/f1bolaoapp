<style>
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24}

/*
  LAYOUT STRATEGY
  ───────────────
  The trick for perfect dot-over-image alignment:
    #circuit-wrap  → position:relative, sized by its parent
    #circuit-bg img → position:absolute, inset:0, width:100%, height:100%, object-fit:contain
    #dots-svg      → position:absolute, inset:0, width:100%, height:100%, viewBox="0 0 121 85", preserveAspectRatio="xMidYMid meet"

  Both the img and the SVG use the same scaling rule (contain / meet = same thing).
  They both fill the same box. Coords always align perfectly.

  The map section uses flex:1 with min-height:0 and min-width:0 so it
  ALWAYS gets priority and can shrink the sidebar, not itself.
  The sidebar uses a fixed width with overflow:hidden so it never pushes the map.
*/

/* Map section: takes all remaining space, never shrinks below 0 */
#map-section {
  flex: 1 1 0;          /* grow AND shrink freely */
  min-width: 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #111;
  position: relative;
}

/* The area that holds the circuit — fills map-section vertically */
#circuit-area {
  flex: 1 1 0;
  min-height: 0;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #111;
}

/*
  circuit-wrap: sized to whichever is smaller — full width OR full height
  constrained to 121:85 ratio. Uses padding-top trick as fallback but
  actually we just let the browser pick via the img contain sizing.
  We make it position:relative so the SVG overlay can be absolute inside it.
*/
#circuit-wrap {
  position: relative;
  /* fill the available area but never exceed it in either dimension */
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Inner container that actually has the 121:85 ratio and holds both layers */
#circuit-inner {
  position: relative;
  /* Take as much space as possible without overflowing */
  max-width: 100%;
  max-height: 100%;
  /* aspect-ratio keeps the box at 121:85 */
  aspect-ratio: 121 / 85;
  /* In each dimension, don't exceed the parent */
  width: 100%;        /* try to be full width … */
  height: 100%;       /* … and full height; aspect-ratio + object-fit resolves the conflict */
}

/* Background: the original SVG circuit file */
#circuit-bg {
  position: absolute;
  inset: 0;
  background: #111;
}
#circuit-bg img {
  width: 100%;
  height: 100%;
  display: block;
  /* invert dark fills to show as subtle asphalt lines on dark bg */
  filter: invert(1) brightness(0.15);
}

/* Dot overlay: identical coordinate space to the image */
#dots-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  overflow: visible;
  pointer-events: none;
}

/* Sidebar: fixed width, never shrinks the map */
#sidebar {
  flex: 0 0 260px;   /* no grow, no shrink */
  width: 260px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-left: 1px solid #1a1a1a;
  background: #0f0f0f;
}

/* On narrow screens (portrait mobile) sidebar collapses fully */
@media (max-width: 640px) {
  #sidebar { display: none; }
}

/* Animations */
@keyframes ring-pulse{0%,100%{r:6;opacity:.12}50%{r:9;opacity:.03}}
.leader-ring{animation:ring-pulse 1.9s ease-in-out infinite}
@keyframes ghost-pulse{0%,100%{opacity:.18}50%{opacity:.5}}
.ghost-dot{animation:ghost-pulse 2.5s ease-in-out infinite}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:#0a0a0a}
::-webkit-scrollbar-thumb{background:#252525}
.rank-row{transition:filter .12s}.rank-row:hover{filter:brightness(1.14)}

/* Bottom nav */
#bottom-nav{
  display:flex;background:#0a0a0a;border-top:1px solid #1a1a1a;flex-shrink:0;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
#bottom-nav a{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:7px 4px 9px;gap:2px;font-family:'Space Grotesk',sans-serif;
  font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  text-decoration:none;color:#333;transition:color .15s;
}
#bottom-nav a.active,#bottom-nav a:hover{color:#e10600}
#bottom-nav .material-symbols-outlined{font-size:20px}
</style>

tailwind.config={darkMode:"class",theme:{extend:{

<!-- MAIN ROW: map + sidebar -->
<div class="flex-1 flex flex-row overflow-hidden min-h-0">

  <!-- MAP SECTION -->
  <section id="map-section">

    <!-- Thin info strip above circuit -->
    <div class="flex items-center justify-between px-4 py-2 bg-[#0d0d0d] border-b border-[#1a1a1a] flex-shrink-0">
      <div class="flex items-center gap-2 min-w-0">
        <span id="race-flag" class="text-base leading-none flex-shrink-0">🏁</span>
        <div class="min-w-0">
          <p id="race-title" class="font-headline font-black uppercase tracking-tighter text-[13px] leading-none truncate">RACE MAP</p>
          <p id="race-meta" class="text-[7px] font-bold uppercase tracking-widest text-[#3a3a3a] mt-0.5 truncate">Loading…</p>

    <!-- Circuit area: fills remaining height of map-section -->
    <div id="circuit-area">

          <!-- Circuit image layer -->

            <img id="circuit-img" src="" alt="Suzuka circuit"/>

          <svg id="dots-svg" viewBox="0 0 121 85"

                  stroke="#e10600" stroke-width="1" stroke-linecap="square" opacity="0.85"/>
            <polygon points="117.4,57.3 119.6,57.3 118.5,55.6" fill="#e10600" opacity="0.75"/>

          <div style="position:absolute;bottom:3%;left:2%;font-size:6px;font-weight:900;letter-spacing:.08em;color:#2a2a2a;background:rgba(10,10,10,.8);padding:1px 4px;pointer-events:none">SUZUKA</div>

    <!-- Legend strip -->

        <div class="flex items-center gap-1"><div class="w-2 h-2 rounded-full bg-[#555]"></div><span class="text-[6px] font-bold uppercase tracking-widest text-[#3a3a3a]">Field</span></div>

  <!-- SIDEBAR -->

<script>
const NICKNAMES   = {"Danilo Iglesias": "DAN", "Eduardo Santos Lima": "EDU", "Fabio Mucci": "FAB", "Guilherme Figueiredo": "GUI", "Liberio Junior": "LIB", "Priscila Rigotto": "PRI", "Rafael Dias": "RAF", "Raphael Stein": "STE", "Ricardo Mucci": "RIC", "Robson Jardim": "ROB", "Vinicius Agostini": "VIN"};
const CIRCUIT_PTS = null; // loaded from plots/circuit-{name}.json
const TOTAL_LAP   = 300;
const BUNDLED = null; // loaded from live/results.json

function nick(n) { return NICKNAMES[n] || n.split(" ")[0].substring(0,3).toUpperCase(); }

// Unique color per driver — gray only if they scored 0 (no points this race)
const DRIVER_COLORS = {
  "Fabio Mucci":          "#e10600",  // red
  "Vinicius Agostini":    "#ff8c00",  // orange
  "Danilo Iglesias":      "#a6c8ff",  // blue
  "Priscila Rigotto":     "#c084fc",  // purple
  "Guilherme Figueiredo": "#34d399",  // emerald
  "Liberio Junior":       "#fbbf24",  // amber
  "Eduardo Santos Lima":  "#f472b6",  // pink
  "Ricardo Mucci":        "#fb923c",  // orange-red
  "Robson Jardim":        "#38bdf8",  // sky
  "Raphael Stein":        "#a3e635",  // lime
  "Rafael Dias":          "#e879f9",  // fuchsia
};
function dotColor(name, pts, maxPts) {
  if (pts < maxPts) return DRIVER_COLORS[name] || "#aaa";  // full color if on circuit
  return DRIVER_COLORS[name] || "#aaa";  // leader also gets their color
}
function dotColorFaded(name) { return "#444"; }  // gray = fell off / no pts

async function init() {
  // 1. Load race results — show nothing if missing
  let data = null;
  try {
    const r = await fetch("live/results.json", {cache:"no-cache"});
    if (r.ok) data = await r.json();
  } catch(_) {}
  if (!data) { showError("No race data found (live/results.json)"); return; }

  // 2. Detect circuit from race name
  const cn = detectCircuit(data);
  if (!cn) { showError("Unknown race: " + (data[0]?.race_name || "?")); return; }

  // 3. Load circuit SVG image — same path as results.html
  const img = document.getElementById("circuit-img");
  if (img) img.src = "images/circuits/" + cn.img;

  // 4. Load circuit plot points — plots/circuit-{slug}.json
  let pts = null;
  try {
    const r = await fetch("plots/circuit-" + cn.slug + ".json", {cache:"no-cache"});
    if (r.ok) { const j = await r.json(); if (j.points) pts = j.points; }
  } catch(_) {}
  if (!pts) { showError("No plot data: plots/circuit-" + cn.slug + ".json"); return; }

  render(data, pts);
}

function showError(msg) {
  document.getElementById("driver-layer").innerHTML =
    '<text x="60" y="42" text-anchor="middle" font-family="Space Grotesk" ' +
    'font-size="4" fill="#444" font-weight="700">' + msg + '</text>';
}

// Exact filenames as used in results.html — keyed by race_name from results.json
// SVG image:  images/circuits/{imgFile}
// Plot JSON:  plots/circuit-{slug}.json  (slug = part after round-XX_)
const CIRCUIT_MAP = {
  'Australian Grand Prix':          { img: 'round-02_AlbertPark_AUstralia.svg', slug: 'AlbertPark_AUstralia' },
  'Chinese Grand Prix':             { img: 'round-04_shanghai.svg',             slug: 'shanghai'             },
  'Japanese Grand Prix':            { img: 'round-03_suzuka.svg',               slug: 'suzuka'               },
  'Bahrain Grand Prix':             { img: 'round-01_sakhir.svg',               slug: 'sakhir'               },
  'Saudi Arabian Grand Prix':       { img: 'round-02_jeddah.svg',               slug: 'jeddah'               },
  'Miami Grand Prix':               { img: 'round-05_miami.svg',                slug: 'miami'                },
  'Emilia Romagna Grand Prix':      { img: 'round-06_imola.svg',                slug: 'imola'                },
  'Monaco Grand Prix':              { img: 'round-07_montecarlo.svg',           slug: 'montecarlo'           },
  'Barcelona-Catalunya Grand Prix': { img: 'round-08_catalunya.svg',            slug: 'catalunya'            },
  'Spanish Grand Prix':             { img: 'round-09_madring.svg',              slug: 'madring'              },
  'Canadian Grand Prix':            { img: 'round-10_montreal.svg',             slug: 'montreal'             },
  'Austrian Grand Prix':            { img: 'round-11_spielberg.svg',            slug: 'spielberg'            },
  'British Grand Prix':             { img: 'round-12_silverstone.svg',          slug: 'silverstone'          },
  'Belgian Grand Prix':             { img: 'round-13_spa.svg',                  slug: 'spa'                  },
  'Hungarian Grand Prix':           { img: 'round-14_hungaroring.svg',          slug: 'hungaroring'          },
  'Dutch Grand Prix':               { img: 'round-15_zandvoort.svg',            slug: 'zandvoort'            },
  'Italian Grand Prix':             { img: 'round-16_monza.svg',                slug: 'monza'                },
  'Azerbaijan Grand Prix':          { img: 'round-17_baku.svg',                 slug: 'baku'                 },
  'Singapore Grand Prix':           { img: 'round-18_singapore.svg',            slug: 'singapore'            },
  'United States Grand Prix':       { img: 'round-19_austin.svg',               slug: 'austin'               },
  'Mexico City Grand Prix':         { img: 'round-20_mexicocity.svg',           slug: 'mexicocity'           },
  'São Paulo Grand Prix':           { img: 'round-21_interlagos.svg',           slug: 'interlagos'           },
  'Las Vegas Grand Prix':           { img: 'round-22_lasvegas.svg',             slug: 'lasvegas'             },
  'Qatar Grand Prix':               { img: 'round-23_lusail.svg',               slug: 'lusail'               },
  'Abu Dhabi Grand Prix':           { img: 'round-24_yasmarinacircuit.svg',     slug: 'yasmarinacircuit'     },
};

function detectCircuit(d) {
  const raceName = d[0]?.race_name || "";
  return CIRCUIT_MAP[raceName] || null;
}

function render(raw, pts) {
  const players = [...raw].sort((a,b) => a.race_rank - b.race_rank || b.race_points - a.race_points);
  const leader  = players[0];
  const maxPts  = leader.race_points;
  const minPts  = players[players.length-1].race_points;

  // Header
  document.getElementById("hdr-sub").textContent      = (leader.race_name||"").replace(" Grand Prix"," GP") + " · Rd " + leader.race_number;
  document.getElementById("race-flag").textContent    = leader.race_flag || "";
  document.getElementById("race-title").textContent   = (leader.race_name||"Race").replace(" Grand Prix"," GP").toUpperCase();
  document.getElementById("race-meta").textContent    = "Rd " + leader.race_number + " · " + (leader.race_date||"") + " · " + players.length + " players";
  document.getElementById("round-badge").textContent  = String(leader.race_number).padStart(2,"0");
  document.getElementById("leader-badge").textContent = maxPts;
  document.getElementById("sidebar-flag").textContent = leader.race_flag || "";

  // Gap panel
  const p2   = players[1];
  const last = players[players.length-1];
  document.getElementById("g-p1").textContent       = "idx " + maxPts + " / " + TOTAL_LAP;
  document.getElementById("g-p2").textContent       = "-" + (maxPts - p2.race_points) + " pts";
  document.getElementById("g-last").textContent     = "-" + (maxPts - minPts) + " pts";
  document.getElementById("g-p2-bar").style.width   = Math.round(p2.race_points / maxPts * 100) + "%";
  document.getElementById("g-last-bar").style.width = Math.round(minPts / maxPts * 100) + "%";

  // Dots — 1:1 mapping: race_points = circuit index
  const dL = document.getElementById("driver-layer");
  const gL = document.getElementById("ghost-layer");
  dL.innerHTML = ""; gL.innerHTML = "";

  // Group tied players to offset their labels
  const byIdx = {};
  players.forEach(p => {
    const k = p.race_points;
    if (!byIdx[k]) byIdx[k] = [];
    byIdx[k].push(p);
  });

  [...players].reverse().forEach((p, ri) => {
    const rank  = p.race_rank;
    const ci    = p.race_points;          // 1:1 — points = circuit index
    const pt    = pts[ci];
    // Color: unique per driver. Gray only if race_points === 0 (DNF / no score).
    const color = p.race_points > 0 ? (DRIVER_COLORS[p.user_name] || "#aaa") : "#444";
    const label = nick(p.user_name);
    const isP1  = rank === 1;

    // Offset dots sharing the same index
    const sibs   = byIdx[ci];
    const sibI   = sibs.indexOf(p);
    const sibOff = sibs.length > 1 ? (sibI - (sibs.length-1)/2) * 3.5 : 0;

    const cx = pt.x;
    const cy = pt.y + sibOff;

    if (isP1) {
      dL.innerHTML += `<g>
        <circle cx="${cx}" cy="${cy}" r="5" fill="${color}" opacity="0.12" class="leader-ring"/>
        <circle cx="${cx}" cy="${cy}" r="2.6" fill="${color}"/>
        <rect x="${cx+3.4}" y="${cy-3.4}" width="${label.length*2.5+3}" height="5.2" fill="#000" opacity="0.7"/>
        <text x="${cx+4.8}" y="${cy+0.4}" font-family="Space Grotesk" font-size="2.8" font-weight="900" fill="#fff">${label}</text>
        <text x="${cx+4.8}" y="${cy-2}" font-family="Inter" font-size="1.7" fill="${color}">${ci}pts</text>
      </g>`;
    } else {
      const up  = ri % 2 === 0;
      const ldy = up ? -3.2 : 4.2;
      dL.innerHTML += `<g>
        <circle cx="${cx}" cy="${cy}" r="1.8" fill="${color}" opacity="0.95"/>
        <text x="${cx}" y="${cy+ldy}" text-anchor="middle"
              font-family="Space Grotesk" font-size="2.2" font-weight="700" fill="${color}">${label}</text>
      </g>`;
    }
  });

  // Leaderboard
  document.getElementById("leaderboard").innerHTML = players.map(p => {
    const rank   = p.race_rank;
    const gap    = maxPts - p.race_points;
    const gapTxt = gap === 0 ? "LEADER" : "-"+gap+" pts";
    const barW   = Math.round(p.race_points / maxPts * 100);
    const label  = nick(p.user_name);
    const dColor = p.race_points > 0 ? (DRIVER_COLORS[p.user_name] || "#aaa") : "#444";
    const bg  = rank===1?"#1c1212":rank<=3?"#111820":"#161616";
    return `<div class="rank-row px-3 py-2 mb-[1px] flex items-center gap-2 border-l-2" style="background:${bg};border-color:${dColor}">
      <div class="flex-shrink-0 w-9 flex flex-col items-center leading-none">
        <span class="font-headline font-black text-[10px] italic" style="color:${dColor}">${String(rank).padStart(2,"0")}</span>
        <span class="font-headline font-black text-[16px] mt-0.5" style="color:${dColor}">${label}</span>
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex justify-between items-center gap-1">
          <p class="text-[8px] text-[#444] truncate">${p.team_name}</p>
          <div class="flex-shrink-0 text-right">
            <span class="font-headline font-black text-[13px] leading-none" style="color:${dColor}">${p.race_points}</span>
            <span class="text-[6px] font-bold ml-1" style="color:${rank===1?"#ffb4a8":"#343434"}">${gapTxt}</span>
          </div>
        </div>
        <div class="mt-1 h-[2px] bg-[#1e1e1e]">
          <div style="width:${barW}%;height:100%;background:${dColor};opacity:0.7"></div>
        </div>
        <div class="flex justify-between mt-0.5">
          <span class="text-[6px] text-[#252525]">Season ${p.season_points}pts</span>
          <span class="text-[6px] text-[#252525]">S#${p.season_rank}</span>
        </div>
      </div>
    </div>`;
  }).join("");
}

init();
</script>
</body>
</html>

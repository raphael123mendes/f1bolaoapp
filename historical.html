<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>F1 Bolão — Historical Data</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
:root{
  --red:#e10600;--red-dim:#ffb4a8;
  --blue:#a6c8ff;--blue-bright:#3192fc;
  --green:#4ade80;--amber:#f59e0b;--purple:#c084fc;
  --surface:#131313;--surface-low:#1c1b1b;--surface-mid:#201f1f;
  --surface-high:#2a2a2a;--surface-highest:#353534;
  --on:#e5e2e1;
  --on-60:rgba(229,226,225,0.6);--on-40:rgba(229,226,225,0.4);
  --on-20:rgba(229,226,225,0.2);--on-08:rgba(229,226,225,0.08);
  --outline:#af8781;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--surface);color:var(--on);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
body{min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;font-family:'Material Symbols Outlined';vertical-align:middle}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:50;background:var(--surface);box-shadow:0 20px 40px rgba(0,0,0,0.3)}
.topbar-inner{display:flex;justify-content:space-between;align-items:center;height:56px;padding:0 16px}
.back-btn{background:none;border:none;cursor:pointer;color:var(--red);padding:6px;display:flex;align-items:center;gap:6px;font-family:'Space Grotesk',sans-serif;font-size:0.75rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase}
.topbar-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1rem;letter-spacing:-0.02em;color:var(--red);text-transform:uppercase}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--on-40);padding:6px;display:flex;align-items:center}

main{flex:1;padding-bottom:80px}

/* ── ENTITY SELECTOR ── */
.filter-bar{display:flex;gap:4px;padding:12px 16px 8px}
.filter-btn{background:var(--surface-high);border:none;color:var(--on-40);font-family:'Inter',sans-serif;font-size:0.6rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;padding:7px 14px;cursor:pointer;transition:all 0.15s}
.filter-btn.active{background:var(--red);color:#fff}
.filter-btn:hover:not(.active){color:var(--on);background:var(--surface-highest)}

.entity-scroll{display:flex;overflow-x:auto;gap:6px;padding:0 16px 10px;scrollbar-width:none}
.entity-scroll::-webkit-scrollbar{display:none}
.entity-pill{flex-shrink:0;display:flex;align-items:center;gap:6px;background:var(--surface-high);border:none;cursor:pointer;padding:5px 10px 5px 5px;transition:all 0.15s;border-bottom:2px solid transparent}
.entity-pill.active{border-bottom-color:var(--red);background:var(--surface-highest)}
.entity-pill:hover:not(.active){background:var(--surface-highest)}
.pill-thumb{width:22px;height:22px;object-fit:cover;object-position:top;flex-shrink:0;background:var(--surface-highest)}
.pill-thumb.car{object-fit:contain;padding:1px}
.pill-name{font-size:0.58rem;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap;color:var(--on)}
.pill-pts{font-size:0.58rem;font-weight:700;color:var(--on-40)}

/* ── HERO ── */
.hero{margin:0 16px 4px;background:var(--surface-low);overflow:hidden;position:relative;border-left:4px solid var(--red)}
.hero-inner{display:flex;align-items:stretch;min-height:120px}
.hero-img-wrap{width:90px;flex-shrink:0;overflow:hidden;background:var(--surface-high);position:relative}
.hero-portrait{width:100%;height:100%;object-fit:cover;object-position:top;display:block}
.hero-car{width:100%;height:100%;object-fit:contain;padding:8px;display:block}
.hero-content{flex:1;padding:16px;min-width:0}
.hero-badge{display:inline-block;background:var(--red);color:#fff;font-size:0.5rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;padding:2px 7px;margin-bottom:6px}
.hero-badge.con{background:var(--blue-bright)}
.hero-name{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:900;text-transform:uppercase;letter-spacing:-0.03em;line-height:1}
.hero-bg-abbr{position:absolute;right:-4px;top:-4px;font-family:'Space Grotesk',sans-serif;font-size:5rem;font-weight:900;font-style:italic;color:rgba(255,255,255,0.04);pointer-events:none;line-height:1}
.hero-stats-row{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap}
.hero-stat{display:flex;flex-direction:column}
.hero-stat-label{font-size:0.46rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;color:var(--on-40)}
.hero-stat-val{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;line-height:1.1}
.hero-stat-sub{font-size:0.5rem;font-weight:700;margin-top:1px}
.hero-stat-sub.pos{color:var(--green)}
.hero-stat-sub.neg{color:var(--red-dim)}
.hero-stat-sub.flat{color:var(--on-40)}

/* ── FORECAST CARDS ── */
.forecast-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin:8px 16px 0}
.fc-card{background:var(--surface-high);padding:12px 10px}
.fc-card.red{border-left:2px solid var(--red)}
.fc-card.blue{border-left:2px solid var(--blue)}
.fc-card.green{border-left:2px solid var(--green)}
.fc-label{font-size:0.48rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;color:var(--on-40);margin-bottom:4px}
.fc-icon{font-size:1.2rem;margin-bottom:4px;display:block}
.fc-val{font-family:'Space Grotesk',sans-serif;font-size:0.85rem;font-weight:700;line-height:1.1}
.fc-sub{font-size:0.5rem;font-weight:600;color:var(--on-40);margin-top:3px;line-height:1.4}

/* ── ROUND TABLE ── */
.table-section{margin:12px 16px 0}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.section-title{font-family:'Space Grotesk',sans-serif;font-size:0.9rem;font-weight:700;text-transform:uppercase;letter-spacing:-0.01em}
.section-sub{font-size:0.5rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--on-40)}
.rotate-hint{display:flex;align-items:center;gap:4px;font-size:0.5rem;font-weight:700;color:var(--blue)}

.tbl-wrap{overflow-x:auto;background:var(--surface-low)}
.tbl-wrap::-webkit-scrollbar{height:3px}
.tbl-wrap::-webkit-scrollbar-thumb{background:var(--red)}
table{width:100%;border-collapse:collapse;min-width:380px}
thead tr{background:var(--surface-highest)}
th{font-size:0.5rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;color:var(--on-40);padding:8px 10px;text-align:left;white-space:nowrap}
th.right{text-align:right}
tbody tr{border-bottom:1px solid var(--on-08);transition:background 0.1s;cursor:pointer}
tbody tr:hover{background:var(--surface-high)}
tbody tr.completed{}
tbody tr.future{opacity:0.4}
tbody tr.cancelled{opacity:0.3;text-decoration:line-through}
tbody tr.best-race{border-left:2px solid var(--green)}
tbody tr.worst-race{border-left:2px solid var(--red-dim)}
tbody tr.sprint{border-left:2px solid var(--amber)}
td{padding:9px 10px;font-size:0.72rem;white-space:nowrap}
td.right{text-align:right}
.td-round{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:0.8rem;color:var(--on-40)}
.td-race{font-weight:700;text-transform:uppercase;letter-spacing:0.02em;font-size:0.65rem}
.td-pts{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1rem;text-align:right}
.td-pts.pos{color:var(--on)}
.td-pts.neg{color:var(--red-dim)}
.td-pts.zero{color:var(--on-40)}
.td-pts.future{color:var(--on-20)}
.td-price{font-family:'Space Grotesk',sans-serif;font-size:0.72rem;font-weight:600;text-align:right;color:var(--on-60)}
.td-chg{font-size:0.62rem;font-weight:700;text-align:right}
.td-chg.pos{color:var(--green)}
.td-chg.neg{color:var(--red-dim)}
.td-chg.flat{color:var(--on-40)}
.td-eff{font-family:'Space Grotesk',sans-serif;font-size:0.72rem;font-weight:700;text-align:right;color:var(--blue)}
.td-eff.neg{color:var(--red-dim)}
.td-eff.zero{color:var(--on-40)}
.sprint-tag{font-size:0.42rem;font-weight:800;background:rgba(245,158,11,0.2);color:var(--amber);padding:1px 4px;letter-spacing:0.08em;text-transform:uppercase;margin-left:4px}
.cancelled-tag{font-size:0.42rem;font-weight:800;background:rgba(229,226,225,0.08);color:var(--on-40);padding:1px 4px;letter-spacing:0.08em;text-transform:uppercase;margin-left:4px}

/* ── COMPETITIVENESS ── */
.comp-section{margin:12px 16px 0}
.comp-grid{display:flex;flex-direction:column;gap:4px;background:var(--surface-low);padding:14px}
.comp-row{display:flex;align-items:center;gap:10px}
.comp-name{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;width:110px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;color:var(--on-60)}
.comp-name:hover{color:var(--blue)}
.comp-name.selected{color:var(--on)}
.comp-bar-wrap{flex:1;height:8px;background:var(--surface-highest);position:relative}
.comp-bar-fill{height:100%;position:absolute;top:0;left:0;transition:width 0.4s}
.comp-eff{font-family:'Space Grotesk',sans-serif;font-size:0.65rem;font-weight:700;width:30px;text-align:right;flex-shrink:0}

/* ── SEASON CHART ── */
.chart-section{margin:12px 16px 0;background:var(--surface-low);padding:14px}
.chart-title{font-size:0.6rem;font-weight:900;letter-spacing:0.16em;text-transform:uppercase;color:var(--on-40);margin-bottom:10px;display:flex;justify-content:space-between}
.chart-svg{width:100%;display:block;overflow:visible}

/* ── LANDSCAPE ── */
@media(orientation:landscape){
  .portrait-only{display:none!important}
  .landscape-wrap{display:flex!important}
  main{padding-bottom:0;height:calc(100dvh - 56px);overflow:hidden}
  .bottom-nav{display:none}
  .topbar{position:relative}
}
.landscape-wrap{
  display:none;
  flex-direction:row;
  height:calc(100dvh - 56px);
  width:100%;
}
.ls-left{width:220px;flex-shrink:0;background:var(--surface-low);overflow-y:auto;border-right:1px solid var(--on-08);display:flex;flex-direction:column}
.ls-right{flex:1;overflow:hidden;padding:0;display:flex;flex-direction:column}
.ls-right-inner{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.ls-entity-sel{padding:8px 10px;border-bottom:1px solid var(--on-08);flex-shrink:0}
.ls-select{width:100%;background:var(--surface-high);border:1px solid var(--red);color:var(--on);font-family:'Space Grotesk',sans-serif;font-size:0.65rem;font-weight:700;text-transform:uppercase;padding:5px 8px;cursor:pointer;outline:none;appearance:none}
.ls-hero{flex-shrink:0;border-left:3px solid var(--red);border-bottom:1px solid var(--on-08);overflow:hidden}
.ls-hero-img{width:100%;height:130px;object-fit:cover;object-position:top;display:block}
.ls-hero-img.car{object-fit:contain;padding:10px;background:var(--surface-mid)}
.ls-hero-meta{padding:10px 12px 12px}
.ls-name{font-family:'Space Grotesk',sans-serif;font-size:0.9rem;font-weight:700;text-transform:uppercase}
.ls-stats{flex:1;overflow-y:auto;min-height:0}
.ls-stat-row{display:flex;justify-content:space-between;padding:7px 12px;border-bottom:1px solid var(--on-08);font-size:0.52rem}
.ls-stat-label{font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--on-40)}
.ls-stat-val{font-family:'Space Grotesk',sans-serif;font-weight:700}
.ls-stat-val.green{color:var(--green)}
.ls-stat-val.blue{color:var(--blue)}
.ls-stat-val.red{color:var(--red-dim)}
.ls-title{font-family:'Space Grotesk',sans-serif;font-size:0.75rem;font-weight:700;text-transform:uppercase;color:var(--on-60);margin-bottom:8px}
.ls-tbl-wrap{overflow-x:auto;background:var(--surface-low)}
.ls-charts-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ls-chart-card{background:var(--surface-low);padding:10px}
.ls-chart-title{font-size:0.55rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;color:var(--on-40);margin-bottom:8px}

/* ── BREAKDOWN POPUP (mobile) ── */
.bd-popup{position:fixed;inset:0;z-index:200;display:flex;align-items:flex-end;justify-content:center}
.bd-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.6)}
.bd-sheet{position:relative;width:100%;max-width:480px;background:var(--surface-mid);border-top:3px solid var(--red);padding:0;max-height:70dvh;display:flex;flex-direction:column;border-radius:0}
.bd-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid var(--on-08);flex-shrink:0}
.bd-title{font-family:'Space Grotesk',sans-serif;font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:-0.01em}
.bd-close{background:none;border:none;cursor:pointer;color:var(--on-40);padding:4px;display:flex;align-items:center}
.bd-body{overflow-y:auto;padding:12px 16px 20px}
.bd-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--on-08)}
.bd-row:last-child{border-bottom:none}
.bd-cat{font-size:0.62rem;font-weight:600;color:var(--on-60)}
.bd-pts{font-family:'Space Grotesk',sans-serif;font-size:0.85rem;font-weight:700}
.bd-pts.pos{color:var(--green)}
.bd-pts.neg{color:var(--red-dim)}
.bd-pts.zero{color:var(--on-40)}
.bd-total{display:flex;justify-content:space-between;padding:10px 0 0;margin-top:4px}
.bd-total-label{font-size:0.55rem;font-weight:900;letter-spacing:0.12em;text-transform:uppercase;color:var(--on-40)}
.bd-total-val{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700}

/* ── LANDSCAPE table fills height ── */
.ls-tbl-wrap{flex:1;overflow-y:auto;background:var(--surface-low);min-height:0}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--surface);box-shadow:0 -10px 40px rgba(0,0,0,0.25);display:flex;height:60px;border-top:1px solid var(--on-08)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;text-decoration:none;color:rgba(166,200,255,0.35);font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.15s;background:none;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
.nav-item.active{color:var(--red);border-top:2px solid var(--red);background:var(--surface-low)}
.nav-item .material-symbols-outlined{font-size:1.3rem}
.nav-item.active .material-symbols-outlined{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
</style>
</head>
<body>

<div id="loading-overlay" style="position:fixed;inset:0;background:#131313;z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px">
  <div style="font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:900;color:#e10600;letter-spacing:-0.02em;text-transform:uppercase">F1 Bolão</div>
  <div style="width:40px;height:2px;background:#2a2a2a;position:relative;overflow:hidden">
    <div style="position:absolute;top:0;left:-100%;width:100%;height:100%;background:#e10600;animation:loadSlide 1s ease infinite"></div>
  </div>
  <style>@keyframes loadSlide{0%{left:-100%}100%{left:100%}}</style>
</div>
<header class="topbar">
  <div class="topbar-inner">
    <button class="back-btn" onclick="history.back()">
      <span class="material-symbols-outlined">arrow_back</span>Back
    </button>
    <div class="topbar-title">Historical Data</div>
    <button class="icon-btn"><span class="material-symbols-outlined">settings</span></button>
  </div>
</header>

<!-- LANDSCAPE -->
<div class="landscape-wrap" id="landscape-wrap">
  <div class="ls-left">
    <div class="ls-entity-sel">
      <select class="ls-select" id="ls-select" onchange="selectEntity(this.value)"></select>
    </div>
    <div class="ls-hero" id="ls-hero"></div>
    <div class="ls-stats" id="ls-stats"></div>
  </div>
  <div class="ls-right" id="ls-right"><div class="ls-right-inner" id="ls-right-inner"></div></div>
</div>

<!-- PORTRAIT -->
<main class="portrait-only">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('Driver',this)">Drivers</button>
    <button class="filter-btn" onclick="setFilter('Constructor',this)">Constructors</button>
  </div>
  <div class="entity-scroll" id="entity-scroll"></div>

  <div class="hero" id="hero">
    <div class="hero-inner">
      <div class="hero-img-wrap" id="hero-img-wrap">
        <img id="hero-img" src="" alt=""/>
      </div>
      <div class="hero-content">
        <div class="hero-bg-abbr" id="hero-abbr"></div>
        <div class="hero-badge" id="hero-badge"></div>
        <div class="hero-name" id="hero-name"></div>
        <div class="hero-stats-row" id="hero-stats"></div>
      </div>
    </div>
  </div>

  <div class="forecast-grid" id="forecast-grid"></div>

  <div class="chart-section" style="margin:8px 16px 0">
    <div class="chart-title">
      <span>Season Performance</span>
      <div class="rotate-hint">
        <span class="material-symbols-outlined" style="font-size:0.9rem">screen_rotation</span>
        Rotate for full table
      </div>
    </div>
    <svg id="season-chart" class="chart-svg" viewBox="0 0 340 140"></svg>
    <div style="display:flex;gap:14px;margin-top:6px">
      <div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:3px;background:var(--red);border-radius:1px"></div><span style="font-size:0.48rem;font-weight:700;text-transform:uppercase;color:var(--on-40)">Points</span></div>
      <div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:2px;background:var(--blue);border-radius:1px;opacity:0.7"></div><span style="font-size:0.48rem;font-weight:700;text-transform:uppercase;color:var(--on-40)">Price $M</span></div>
    </div>
  </div>

  <div class="table-section">
    <div class="section-header">
      <span class="section-title">Round by Round</span>
      <div class="rotate-hint">
        <span class="material-symbols-outlined" style="font-size:0.9rem">screen_rotation</span>Rotate for full view
      </div>
    </div>
    <div class="tbl-wrap" id="tbl-wrap">
      <table id="round-table">
        <thead><tr>
          <th>R</th><th>Race</th>
          <th class="right">Pts</th>
          <th class="right">Price</th>
          <th class="right">Chg</th>
          <th class="right">Pts/$M</th>
        </tr></thead>
        <tbody id="round-tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="comp-section">
    <div class="section-header">
      <span class="section-title">Market Competitiveness</span>
      <span class="section-sub">Pts / $M</span>
    </div>
    <div class="comp-grid" id="comp-grid"></div>
  </div>
</main>

<!-- BREAKDOWN POPUP -->
<div id="bd-popup" class="bd-popup" style="display:none" onclick="closeBdPopup(event)">
  <div class="bd-backdrop"></div>
  <div class="bd-sheet">
    <div class="bd-header">
      <div class="bd-title" id="bd-title">Breakdown</div>
      <button class="bd-close" onclick="closeBdPopup()"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div class="bd-body" id="bd-body"></div>
  </div>
</div>

<nav class="bottom-nav portrait-only">
  <a class="nav-item" href="index.html"><span class="material-symbols-outlined">leaderboard</span><span>Standings</span></a>
  <a class="nav-item" href="results.html"><span class="material-symbols-outlined">flag</span><span>Results</span></a>
  <a class="nav-item active" href="market.html"><span class="material-symbols-outlined">monetization_on</span><span>Market</span></a>
  <a class="nav-item" href="race.html"><span class="material-symbols-outlined">sports_motorsports</span><span>Race</span></a>
</nav>

<script>let DATA = {};
let SORTED_NAMES = [];
let DRIVER_SLUG = {};
let CON_SLUG = {};

// ── DATA BUILDER ──────────────────────────────────────────────────────────
// Sources of truth:
//   prices.json     → entity list, type, price history, gameday_points, total_points,
//                     season_high, season_low, pct_vs_high, pct_vs_low  (ALL entities)
//   picks.json      → ownership counts, captain info  (only picked entities/races)
//   breakdowns.json → points breakdown categories     (only picked entities)
//   races.json      → sprint, cancelled flags
//   config.json     → image slug overrides
function buildHistData(picks, pricesData, races, breakdowns) {
  // prices.json is now a wrapper object { prices: [...], updated_at, ... }
  const prices = Array.isArray(pricesData) ? pricesData : (pricesData.prices || []);

  // Race metadata by round number
  const raceMap = {};
  races.forEach(r => raceMap[r.round] = r);

  // ── BREAKDOWNS (only for picked entities) ────────────────────────────
  const breakdownsByEntity = {}; // { name: { rn: [{category,points}] } }
  breakdowns.forEach(b => {
    if (!breakdownsByEntity[b.pick_name]) breakdownsByEntity[b.pick_name] = {};
    if (!breakdownsByEntity[b.pick_name][b.race_number]) breakdownsByEntity[b.pick_name][b.race_number] = [];
    breakdownsByEntity[b.pick_name][b.race_number].push({
      category: b.breakdown_category,
      points: b.breakdown_points
    });
  });

  // ── OWNERSHIP from picks.json ─────────────────────────────────────────
  const maxPickRace = picks.length > 0 ? Math.max(...picks.map(p => p.race_number)) : 0;
  const totalUsers = Math.max(1, new Set(picks.filter(p => p.race_number === maxPickRace).map(p => p.user_name)).size);
  const ownCounts = {}; // { name: Set<user_name> }
  picks.filter(p => p.race_number === maxPickRace).forEach(p => {
    if (!ownCounts[p.pick_name]) ownCounts[p.pick_name] = new Set();
    ownCounts[p.pick_name].add(p.user_name);
  });
  // Track which entities were ever picked (for was_picked flag)
  const everPicked = new Set(picks.map(p => p.pick_name));

  // ── PRICES — build per-entity per-race lookup ─────────────────────────
  const priceByEntity = {}; // { name: { type, byRace: { rn: {...} } } }
  prices.forEach(p => {
    if (!priceByEntity[p.player_name]) priceByEntity[p.player_name] = { type: p.type, byRace: {} };
    priceByEntity[p.player_name].byRace[p.race_number] = {
      price:       p.price_this_race,
      pricePrev:   p.price_prev_race,
      priceNext:   p.price_next_race,
      chg:         p.price_change,
      chgPct:      p.price_change_pct,
      // Points from gameday — null means race not yet played or entity didn't score
      gamedayPts:  p.gameday_points ?? null,
      totalPts:    p.total_points ?? null,
      seasonHigh:  p.season_high ?? null,
      seasonLow:   p.season_low ?? null,
      pctVsHigh:   p.pct_vs_high ?? null,
      pctVsLow:    p.pct_vs_low ?? null,
      raceName:    p.race_name,
      raceFlag:    p.race_flag,
      raceDate:    p.race_date,
      nextRaceName: p.next_race_name
    };
  });

  // All race numbers and entity names — canonical from prices.json
  const allRaceNums = [...new Set(prices.map(p => p.race_number))].sort((a, b) => a - b);
  const allNames    = [...new Set(prices.map(p => p.player_name))];

  // Latest race with actual price data (highest race_number)
  const maxPriceRace = allRaceNums[allRaceNums.length - 1] || 1;
  const latestPrice  = {};
  prices.filter(p => p.race_number === maxPriceRace).forEach(p => latestPrice[p.player_name] = p);

  // ── BUILD DATA ────────────────────────────────────────────────────────
  const DATA = {};
  allNames.forEach(name => {
    const pe      = priceByEntity[name];
    const wasPicked = everPicked.has(name);
    const myBreakdowns = breakdownsByEntity[name] || null;

    const lat      = latestPrice[name] || {};
    // current price = price_next_race of latest entry, or price_this_race if next is null
    const curPrice = lat.price_next_race ?? lat.price_this_race ?? 0;

    // total_points from prices.json — take the max total_points seen (latest cumulative)
    // For races with null total_points (future), skip
    const totalPtsFromPrices = Math.max(
      0,
      ...Object.values(pe.byRace)
        .map(r => r.totalPts)
        .filter(v => v !== null)
    );

    const rows = allRaceNums.map(rn => {
      const rInfo = raceMap[rn] || {};
      const pr    = pe.byRace[rn] || {};
      const price = pr.price || 0;

      // gameday_points null = race not yet played (or entity didn't participate)
      const gamedayPts = pr.gamedayPts ?? null;
      const hasResult  = gamedayPts !== null;

      const eff = hasResult && price > 0
        ? Math.round(gamedayPts / price * 100) / 100
        : null;

      // Breakdown only if entity was picked
      const breakdown = myBreakdowns ? (myBreakdowns[rn] || []) : null;

      return {
        race:          rn,
        race_name:     pr.raceName  || rInfo.race_name || '',
        race_flag:     pr.raceFlag  || rInfo.race_flag || '',
        race_date:     pr.raceDate  || rInfo.race_date || '',
        sprint:        rInfo.sprint_weekend || false,
        cancelled:     rInfo.cancelled     || false,
        pts:           gamedayPts,    // null = future/no data
        total_pts_at:  pr.totalPts ?? null, // running total at this race
        has_result:    hasResult,
        was_picked:    wasPicked,
        price,
        price_prev:    pr.pricePrev  || 0,
        price_next:    pr.priceNext  ?? null,
        price_chg:     pr.chg        || 0,
        price_chg_pct: pr.chgPct     || 0,
        season_high:   pr.seasonHigh ?? null,
        season_low:    pr.seasonLow  ?? null,
        pct_vs_high:   pr.pctVsHigh  ?? null,
        pct_vs_low:    pr.pctVsLow   ?? null,
        eff,
        breakdown
      };
    });

    DATA[name] = {
      type:              pe.type || 'Driver',
      was_picked:        wasPicked,
      total_pts:         totalPtsFromPrices,
      current_price:     curPrice,
      next_price:        lat.price_next_race ?? curPrice,
      next_price_chg:    lat.price_change    || 0,
      next_price_chg_pct: lat.price_change_pct || 0,
      season_high:       lat.season_high  ?? null,
      season_low:        lat.season_low   ?? null,
      ownership:         ownCounts[name]
                           ? Math.round(ownCounts[name].size / totalUsers * 100)
                           : 0,
      pts_per_m: curPrice > 0 && totalPtsFromPrices > 0
                   ? Math.round(totalPtsFromPrices / curPrice * 10) / 10
                   : 0,
      rows
    };
  });

  // Sort by total_pts descending — all entities show, unpicked ones sort to bottom
  const SORTED_NAMES = allNames.sort((a, b) => DATA[b].total_pts - DATA[a].total_pts);
  return { DATA, SORTED_NAMES };
}

// ── miniSvg — with data point labels ─────────────────────────────────────
function miniSvg(rows, W, H) {
  const allRows = rows.filter(r => r.price > 0);
  const completed = rows.filter(r => r.has_result);
  if (allRows.length < 1) return '';

  // Price-only chart (no pts data)
  if (completed.length < 1) {
    const prices = allRows.map(r => r.price);
    const minP = Math.min(...prices), maxP = Math.max(...prices, minP + 0.1);
    const PAD = { l:6, r:6, t:16, b:20 };
    const IH = H - PAD.t - PAD.b;
    const IW = W - PAD.l - PAD.r;
    const pts = prices.map((v,i) => [
      PAD.l + (i / (allRows.length - 1 || 1)) * IW,
      PAD.t + ((maxP - v) / (maxP - minP || 1)) * IH
    ]);
    const path = pts.map((p,i) => `${i===0?'M':'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
    return `<svg viewBox="0 0 ${W} ${H + PAD.b}" style="width:100%;display:block;overflow:visible">
      <path d="${path}" fill="none" stroke="#a6c8ff" stroke-width="1.5" stroke-dasharray="3,2" stroke-linejoin="round"/>
      ${pts.map((p,i) => `
        <circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.5" fill="#a6c8ff"/>
        <text x="${p[0].toFixed(1)}" y="${(p[1]-6).toFixed(1)}" text-anchor="middle" font-family="Inter" font-size="7.5" font-weight="700" fill="#a6c8ff">$${prices[i].toFixed(1)}M</text>
        <text x="${p[0].toFixed(1)}" y="${(H + PAD.b - 4).toFixed(1)}" text-anchor="middle" font-family="Inter" font-size="7.5" fill="rgba(229,226,225,0.3)">R${allRows[i].race}</text>
      `).join('')}
      <text x="${W/2}" y="${H/2+4}" text-anchor="middle" font-family="Inter" font-size="9" fill="rgba(229,226,225,0.2)">Price only — no picks data</text>
    </svg>`;
  }

  const PAD = { l:6, r:6, t:18, b:20 };
  const IW = W - PAD.l - PAD.r;
  // Split chart vertically: top half = pts, bottom half = price
  const halfH = (H - PAD.t - PAD.b) / 2;

  const priceVals = completed.map(r => r.price);
  const ptsVals   = completed.map(r => r.pts);
  const maxPts    = Math.max(...ptsVals.map(Math.abs), 1);
  const minP = Math.min(...priceVals), maxP = Math.max(...priceVals, minP + 0.1);
  const N = completed.length;

  // Pts line (top area)
  const ptsPoints = ptsVals.map((v, i) => [
    PAD.l + (i / (N - 1 || 1)) * IW,
    PAD.t + halfH - (Math.max(0, v) / maxPts) * (halfH - 4)
  ]);
  // Price line (bottom area)
  const pricePoints = priceVals.map((v, i) => [
    PAD.l + (i / (N - 1 || 1)) * IW,
    PAD.t + halfH + 6 + ((maxP - v) / (maxP - minP || 1)) * (halfH - 10)
  ]);

  const ptsPath   = ptsPoints.map((p,i)=>`${i===0?'M':'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const pricePath = pricePoints.map((p,i)=>`${i===0?'M':'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');

  const gId = 'g' + Math.random().toString(36).slice(2,6);
  const bottomY = PAD.t + halfH * 2;

  // Value label placement: avoid overlap by alternating above/below
  const ptsLabels = ptsPoints.map((p, i) => {
    const above = i % 2 === 0;
    const ly = above ? p[1] - 6 : p[1] + 13;
    return `<text x="${p[0].toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="middle" font-family="Inter" font-size="7" font-weight="700" fill="#e10600">${ptsVals[i]>0?'+':''}${ptsVals[i]}</text>`;
  }).join('');

  const priceLabels = pricePoints.map((p, i) => {
    const above = i % 2 !== 0;
    const ly = above ? p[1] - 5 : p[1] + 12;
    return `<text x="${p[0].toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="middle" font-family="Inter" font-size="7" font-weight="600" fill="rgba(166,200,255,0.75)">$${priceVals[i].toFixed(1)}M</text>`;
  }).join('');

  const raceLabels = completed.map((r, i) => {
    const x = PAD.l + (i / (N - 1 || 1)) * IW;
    return `<text x="${x.toFixed(1)}" y="${(bottomY + PAD.b - 4).toFixed(1)}" text-anchor="middle" font-family="Inter" font-size="7.5" fill="rgba(229,226,225,0.3)">R${r.race}</text>`;
  }).join('');

  // Gradient fill under pts line
  const fillPath = `${ptsPath} L${ptsPoints[N-1][0].toFixed(1)},${(PAD.t+halfH).toFixed(1)} L${PAD.l},${(PAD.t+halfH).toFixed(1)} Z`;

  return `<svg viewBox="0 0 ${W} ${bottomY + PAD.b}" style="width:100%;display:block;overflow:visible">
    <defs>
      <linearGradient id="${gId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#e10600" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="#e10600" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <line x1="${PAD.l}" y1="${(PAD.t+halfH).toFixed(1)}" x2="${(W-PAD.r).toFixed(1)}" y2="${(PAD.t+halfH).toFixed(1)}" stroke="rgba(229,226,225,0.06)" stroke-width="1"/>
    <path d="${fillPath}" fill="url(#${gId})"/>
    <path d="${ptsPath}" fill="none" stroke="#e10600" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${ptsPoints.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.5" fill="#e10600"/>`).join('')}
    ${ptsLabels}
    <path d="${pricePath}" fill="none" stroke="#a6c8ff" stroke-width="1.5" stroke-dasharray="3,2" stroke-linejoin="round"/>
    ${pricePoints.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2" fill="#a6c8ff" opacity="0.8"/>`).join('')}
    ${priceLabels}
    ${raceLabels}
  </svg>`;
}

// ── SELECTOR ──────────────────────────────────────────────────────────────
function buildSelector() {
  const names = filteredNames();
  const el = document.getElementById('entity-scroll');
  el.innerHTML = names.map(name => {
    const d = DATA[name];
    return `<button class="entity-pill${name===selectedEntity?' active':''}" onclick="selectEntity('${name.replace(/'/g,"\\'")}')">
      <img class="pill-thumb${isCon(name)?' car':''}" src="${heroImg(name)}" alt=""/>
      <span class="pill-name">${name.split(' ').slice(-1)[0]}</span>
      <span class="pill-pts">${d.total_pts}</span>
    </button>`;
  }).join('');
  el.querySelector('.active')?.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  // ls select
  const lsSel = document.getElementById('ls-select');
  if (lsSel) {
    lsSel.innerHTML = SORTED_NAMES.map(n=>`<option value="${n}"${n===selectedEntity?' selected':''}>${n}</option>`).join('');
  }
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildSelector();
}

function selectEntity(name) {
  selectedEntity = name;
  buildSelector();
  renderAll();
}

  // Season high/low card
  const highLowCard = d.season_high && d.season_low
    ? `<div class="fc-card blue">

        <span class="material-symbols-outlined fc-icon" style="color:var(--blue)">area_chart</span>
        <div class="fc-val">$${d.season_low.toFixed(1)}–$${d.season_high.toFixed(1)}M</div>

// ── ROUND TABLE ───────────────────────────────────────────────────────────
function renderTable() {
  const d = DATA[selectedEntity];
  const completedRows = d.rows.filter(r => r.has_result);
  const bestPts = completedRows.length ? Math.max(...completedRows.map(r => r.pts)) : 0;
  const worstPts = completedRows.length > 1 ? Math.min(...completedRows.map(r => r.pts)) : null;

  document.getElementById('round-tbody').innerHTML = d.rows.map(row => {
    const isBest = row.has_result && row.pts === bestPts && bestPts > 0;
    const isWorst = row.has_result && worstPts !== null && row.pts === worstPts && worstPts < bestPts;
    const rowCls = row.cancelled ? 'cancelled' : !row.has_result && !d.was_picked ? 'future' : !row.has_result ? 'future' : isBest ? 'best-race' : isWorst ? 'worst-race' : row.sprint ? 'sprint' : 'completed';
    const ptsClass = !row.has_result ? 'future' : row.pts > 0 ? 'pos' : row.pts < 0 ? 'neg' : 'zero';
    const chgCls = row.price_chg > 0 ? 'pos' : row.price_chg < 0 ? 'neg' : 'flat';
    const effCls = row.eff > 0 ? '' : row.eff !== null && row.eff < 0 ? 'neg' : 'zero';
    const sprintTag = row.sprint ? '<span class="sprint-tag">Sprint</span>' : '';
    const cancelTag = row.cancelled ? '<span class="cancelled-tag">Cancelled</span>' : '';
    const ptsDisplay = !row.has_result ? (d.was_picked ? 'n/p' : '—') : row.pts;
    const effDisplay = row.eff !== null ? row.eff : '—';

    // Breakdown — mobile shows tap button, not inline text
    const hasBd = row.breakdown && row.breakdown.length > 0;
    const bdBtn = hasBd
      ? `<button onclick="showBreakdown(event,'${row.race_name.replace(/'/g,"\\'")}',${row.race})" style="background:rgba(161,198,255,0.1);border:none;cursor:pointer;color:var(--blue);font-size:0.42rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;padding:2px 6px;margin-left:6px;vertical-align:middle">BD</button>`
      : '';

    return `<tr class="${rowCls}" data-race="${row.race}">
      <td><span class="td-round">R${String(row.race).padStart(2,'0')}</span></td>
      <td><span class="td-race">${row.race_name.replace(' Grand Prix','').replace(' GP','')}${sprintTag}${cancelTag}${bdBtn}</span></td>
      <td class="right"><span class="td-pts ${ptsClass}">${ptsDisplay}</span></td>
      <td class="right"><span class="td-price">$${row.price.toFixed(1)}M</span></td>
      <td class="right"><span class="td-chg ${chgCls}">${row.price_chg >= 0 ? '+' : ''}$${row.price_chg.toFixed(1)}M</span></td>
      <td class="right"><span class="td-eff ${effCls}">${effDisplay}</span></td>
    </tr>`;
  }).join('');
}

// ── COMPETITIVENESS ───────────────────────────────────────────────────────
function renderComp() {
  const d = DATA[selectedEntity];
  const sameType = Object.entries(DATA)
    .filter(([n, e]) => e.type === d.type && e.pts_per_m >= 0)
    .sort((a, b) => b[1].pts_per_m - a[1].pts_per_m)
    .slice(0, 10);
  const maxEff = sameType[0]?.[1].pts_per_m || 1;

  document.getElementById('comp-grid').innerHTML = sameType.map(([name, e], i) => {
    const color = CAT_COLORS_COMP[i % CAT_COLORS_COMP.length];
    const isSelected = name === selectedEntity;
    return `<div class="comp-row">
      <span class="comp-name${isSelected?' selected':''}" onclick="selectEntity('${name.replace(/'/g,"\\'")}')">${name.split(' ').slice(-1)[0]}</span>
      <div class="comp-bar-wrap">
        <div class="comp-bar-fill" style="width:${maxEff>0?(e.pts_per_m/maxEff*100).toFixed(1):0}%;background:${isSelected?'var(--red)':color};opacity:${isSelected?1:0.5}"></div>
      </div>
      <span class="comp-eff" style="color:${isSelected?'var(--red)':color}">${e.pts_per_m}</span>
    </div>`;
  }).join('');
}

// ── LANDSCAPE ─────────────────────────────────────────────────────────────
function renderLandscape() {
  const d = DATA[selectedEntity];
  const lsSel = document.getElementById('ls-select');
  if (lsSel) lsSel.innerHTML = SORTED_NAMES.map(n=>`<option value="${n}"${n===selectedEntity?' selected':''}>${n}</option>`).join('');

  document.getElementById('ls-hero').innerHTML = `
    <img src="${heroImg(selectedEntity)}" alt="" class="ls-hero-img${isCon(selectedEntity)?' car':''}" onerror="this.style.display='none'"/>
    <div class="ls-hero-meta">
      <div class="ls-name">${selectedEntity}</div>
      <div style="font-size:0.52rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--blue);margin-top:2px">${d.type}</div>
    </div>`;

  document.getElementById('ls-stats').innerHTML = [
    {l:'Current Price', v:`$${d.current_price.toFixed(1)}M`,  cls:'blue'},
    {l:'Next Price',    v:`$${d.next_price.toFixed(1)}M`,     cls:d.next_price_chg>0?'green':d.next_price_chg<0?'red':''},
    {l:'Season Pts',   v: d.total_pts || '—'},
    {l:'Pts / $M',     v: d.pts_per_m || '—',                cls:d.pts_per_m>5?'green':d.pts_per_m>0?'':''},
    {l:'Season High',  v: d.season_high ? `$${d.season_high.toFixed(1)}M` : '—', cls:'green'},
    {l:'Season Low',   v: d.season_low  ? `$${d.season_low.toFixed(1)}M`  : '—', cls:'red'},
    {l:'Ownership',    v: d.was_picked ? `${d.ownership}%` : 'Not picked'},
  ].map(s=>`<div class="ls-stat-row"><span class="ls-stat-label">${s.l}</span><span class="ls-stat-val${s.cls?' '+s.cls:''}">${s.v}</span></div>`).join('');

  // Right panel — chart uses taller H to accommodate labels
  const W = 500;
  const CHART_H = 110;
  document.getElementById('ls-right-inner').innerHTML = `
    <div class="ls-title">${selectedEntity} — Full Historical View</div>

    <div class="ls-chart-card">
      <div class="ls-chart-title" style="display:flex;justify-content:space-between;align-items:center">
        <span>Points &amp; Price — all ${d.rows.filter(r=>r.has_result).length} rounds</span>
        <span style="display:flex;gap:12px">
          <span style="display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:10px;height:3px;background:#e10600;border-radius:1px"></span><span style="font-size:0.44rem;font-weight:700;letter-spacing:0.1em;color:var(--on-40)">POINTS</span></span>
          <span style="display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:10px;height:2px;background:#a6c8ff;border-radius:1px;opacity:0.7"></span><span style="font-size:0.44rem;font-weight:700;letter-spacing:0.1em;color:var(--on-40)">PRICE $M</span></span>
        </span>
      </div>
      ${miniSvg(d.rows, W, CHART_H) || '<div style="color:var(--on-40);font-size:0.7rem;padding:8px">No completed races yet</div>'}
    </div>

    <div class="ls-tbl-wrap">
      <table style="width:100%;border-collapse:collapse;min-width:400px">
        <thead><tr style="background:var(--surface-highest)">
          <th style="font-size:0.5rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;color:var(--on-40);padding:7px 10px;text-align:left">R</th>
          <th style="font-size:0.5rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;color:var(--on-40);padding:7px 10px;text-align:left">Race</th>
          <th style="font-size:0.5rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;color:var(--on-40);padding:7px 10px;text-align:right">Pts</th>
          <th style="font-size:0.5rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;color:var(--on-40);padding:7px 10px;text-align:right">Price</th>
          <th style="font-size:0.5rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;color:var(--on-40);padding:7px 10px;text-align:right">Chg $</th>
          <th style="font-size:0.5rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;color:var(--on-40);padding:7px 10px;text-align:right">Chg%</th>
          <th style="font-size:0.5rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;color:var(--on-40);padding:7px 10px;text-align:right">Pts/$M</th>
        </tr></thead>
        <tbody>${d.rows.map(row=>{
          const ptsC = !row.has_result?'var(--on-20)':row.pts>0?'var(--on)':row.pts<0?'var(--red-dim)':'var(--on-40)';
          const chgC = row.price_chg>0?'var(--green)':row.price_chg<0?'var(--red-dim)':'var(--on-40)';
          const effC = row.eff>0?'var(--blue)':row.eff!==null&&row.eff<0?'var(--red-dim)':'var(--on-40)';
          const ptsDisplay = !row.has_result ? (d.was_picked ? 'n/p' : '—') : row.pts;
          const effDisplay = row.eff !== null ? row.eff : '—';
          const bdHasBd = row.breakdown && row.breakdown.length > 0;
          const lsBdBtn = bdHasBd
            ? `<button onclick="showBreakdown(event,'${row.race_name.replace(/'/g,"\\'")}',${row.race})" style="background:rgba(161,198,255,0.1);border:none;cursor:pointer;color:var(--blue);font-size:0.42rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;padding:2px 5px;margin-left:5px;vertical-align:middle">BD</button>`
            : '';
          return `<tr style="border-bottom:1px solid var(--on-08)">
            <td style="padding:7px 10px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:0.72rem;color:var(--on-40)">R${String(row.race).padStart(2,'0')}</td>
            <td style="padding:7px 10px;font-size:0.65rem;font-weight:700;text-transform:uppercase">
              ${row.race_name.replace(' Grand Prix','').replace(' GP','')}${row.sprint?'<span style="font-size:0.42rem;background:rgba(245,158,11,0.2);color:var(--amber);padding:1px 4px;margin-left:4px">S</span>':''}${lsBdBtn}
            </td>
            <td style="padding:7px 10px;text-align:right;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:0.9rem;color:${ptsC}">${ptsDisplay}</td>
            <td style="padding:7px 10px;text-align:right;font-size:0.68rem;color:var(--on-60)">$${row.price.toFixed(1)}M</td>
            <td style="padding:7px 10px;text-align:right;font-size:0.65rem;font-weight:700;color:${chgC}">${row.price_chg>=0?'+':''}$${row.price_chg.toFixed(1)}M</td>
            <td style="padding:7px 10px;text-align:right;font-size:0.65rem;font-weight:700;color:${chgC}">${row.price_chg_pct>=0?'+':''}${row.price_chg_pct.toFixed(1)}%</td>
            <td style="padding:7px 10px;text-align:right;font-family:'Space Grotesk',sans-serif;font-size:0.72rem;font-weight:700;color:${effC}">${effDisplay}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>

    <div class="ls-chart-card">
      <div class="ls-chart-title">Market Competitiveness — Pts/$M (${DATA[selectedEntity].type}s)</div>
      ${(()=>{
        const sameType = Object.entries(DATA).filter(([n,e])=>e.type===DATA[selectedEntity].type&&e.pts_per_m>=0).sort((a,b)=>b[1].pts_per_m-a[1].pts_per_m).slice(0,10);
        const mx = sameType[0]?.[1].pts_per_m||1;
        return sameType.map(([name,e],i)=>{
          const color = CAT_COLORS_COMP[i%CAT_COLORS_COMP.length];
          const isSel = name===selectedEntity;
          return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
            <span style="font-size:0.55rem;font-weight:700;text-transform:uppercase;width:100px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:${isSel?'var(--on)':'var(--on-40)'};cursor:pointer" onclick="selectEntity('${name.replace(/'/g,"\\'")}')">${name.split(' ').slice(-1)[0]}</span>
            <div style="flex:1;height:8px;background:var(--surface-highest);position:relative">
              <div style="width:${mx>0?(e.pts_per_m/mx*100).toFixed(1):0}%;height:100%;background:${isSel?'var(--red)':color};opacity:${isSel?1:0.55}"></div>
            </div>
            <span style="font-family:'Space Grotesk',sans-serif;font-size:0.65rem;font-weight:700;color:${isSel?'var(--red)':color};width:28px;text-align:right">${e.pts_per_m}</span>
          </div>`;
        }).join('');
      })()}
    </div>`;
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────
function renderAll() {
  renderHero();
  renderForecast();
  renderChart();
  renderTable();
  renderComp();
  renderLandscape();
}


async function init() {
  try {
    const [cfg, picks, prices, races, breakdowns] = await Promise.all([
      fetch('config.json').then(r => r.json()),
      fetch('picks.json').then(r => r.json()),
      fetch('prices.json').then(r => r.json()),
      fetch('races.json').then(r => r.json()),
      fetch('breakdowns.json').then(r => r.json()),
    ]);

    // Load slug overrides from config.json
    DRIVER_SLUG = cfg.driver_slug_overrides || {};
    CON_SLUG = cfg.constructor_slug_overrides || {};

    const result = buildHistData(picks, prices, races, breakdowns);
    DATA = result.DATA;
    SORTED_NAMES = result.SORTED_NAMES;

    // Validate or pick a good default entity
    // Prefer URL param → first entity with pts → first entity in SORTED_NAMES
    if (!selectedEntity || !DATA[selectedEntity]) {
      const firstWithPts = SORTED_NAMES.find(n => DATA[n].total_pts > 0);
      selectedEntity = firstWithPts || SORTED_NAMES[0] || '';
    }

    document.getElementById('loading-overlay')?.remove();
    buildSelector();
    renderAll();
  } catch(e) {
    console.error('historical.html error:', e);
    document.getElementById('loading-overlay').innerHTML = '<div style="color:#ffb4a8;font-family:Inter;padding:20px;text-align:center">Failed to load data.<br>Please refresh.</div>';
  }
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>

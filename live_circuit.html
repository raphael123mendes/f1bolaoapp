<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Live Circuit — Full Grid Sweep</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --red:#e10600; --red-dim:#ffb4a8;
  --blue:#a6c8ff; --blue-bright:#3192fc;
  --surface:#131313; --surface-low:#1c1b1b; --surface-mid:#201f1f;
  --surface-high:#2a2a2a; --surface-highest:#353534;
  --on:#e5e2e1; --on-60:rgba(229,226,225,0.6); --on-40:rgba(229,226,225,0.4);
  --on-20:rgba(229,226,225,0.2); --on-08:rgba(229,226,225,0.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  background:var(--surface);color:var(--on);
  font-family:'Inter',sans-serif;
  width:100%;height:100%;overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ── LANDSCAPE WRAPPER ─────────── */
.wrap{
  display:flex;flex-direction:row;
  width:100vw;height:100vh;
  overflow:hidden;
}

/* ── LEFT: CIRCUIT PANEL ───────── */
.circuit-panel{
  flex:1;
  background:var(--surface-low);
  display:flex;flex-direction:column;
  position:relative;overflow:hidden;
}

.circuit-header{
  padding:20px 24px 0;
  display:flex;justify-content:space-between;align-items:flex-start;
  flex-shrink:0;
  z-index:10;
}
.circuit-title{
  font-family:'Space Grotesk',sans-serif;
  font-size:clamp(1.4rem,3vw,2.4rem);
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:-0.03em;
  line-height:1;
}
.circuit-title span{color:var(--red)}
.live-tag{
  display:flex;align-items:center;gap:8px;
  margin-top:10px;
}
.live-dot{
  width:10px;height:10px;background:var(--red);
  animation:blink 1.1s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.live-label{
  font-size:0.55rem;font-weight:900;letter-spacing:0.2em;
  text-transform:uppercase;color:var(--on-60);
}

.race-info{
  text-align:right;
  font-family:'Space Grotesk',sans-serif;
}
.race-info .round{
  font-size:0.5rem;font-weight:700;letter-spacing:0.2em;
  text-transform:uppercase;color:var(--on-40);
}
.race-info .gp-name{
  font-size:1rem;font-weight:900;text-transform:uppercase;
  letter-spacing:-0.02em;color:var(--on);
}
.race-info .venue{
  font-size:0.5rem;font-weight:600;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--on-40);margin-top:2px;
}

/* ── CIRCUIT MAP ───────────────── */
.circuit-map{
  flex:1;
  position:relative;
  display:flex;align-items:center;justify-content:center;
  padding:12px 20px;
}

#circuit-svg-wrap{
  position:relative;
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
}

/* The actual SVG overlay sits on top of the track image */
#overlay-svg{
  position:absolute;
  top:0;left:0;width:100%;height:100%;
  pointer-events:none;
  filter:drop-shadow(0 0 12px rgba(225,6,0,0.15));
}

/* Track image rendered as SVG background */
#track-img{
  max-width:80%;
  max-height:80%;
  width:auto;height:auto;
  opacity:0.18;
  filter:invert(1) brightness(2);
}

/* ── RIGHT: LEADERBOARD ─────────── */
.leaderboard-panel{
  width:300px;
  flex-shrink:0;
  background:var(--surface-mid);
  display:flex;flex-direction:column;
  border-left:1px solid var(--on-08);
}

.lb-header{
  padding:16px 20px;
  border-bottom:1px solid var(--on-08);
  background:var(--surface-low);
  display:flex;justify-content:space-between;align-items:center;
  flex-shrink:0;
}
.lb-title{
  font-family:'Space Grotesk',sans-serif;
  font-size:0.8rem;font-weight:900;
  text-transform:uppercase;letter-spacing:0.05em;
  font-style:italic;
}

.lb-list{
  flex:1;overflow-y:auto;
}
.lb-list::-webkit-scrollbar{width:2px}
.lb-list::-webkit-scrollbar-track{background:transparent}
.lb-list::-webkit-scrollbar-thumb{background:var(--on-20)}

.lb-row{
  display:flex;align-items:center;
  padding:10px 16px;
  gap:10px;
  border-bottom:1px solid var(--on-08);
  transition:background 0.1s;
  cursor:default;
}
.lb-row:hover{background:var(--surface-high)}
.lb-row.leader{
  background:var(--surface-high);
  border-left:3px solid var(--red);
}
.lb-rank{
  font-family:'Space Grotesk',sans-serif;
  font-size:1.1rem;font-weight:900;font-style:italic;
  width:24px;flex-shrink:0;
  color:var(--on-40);
}
.lb-row.leader .lb-rank{color:var(--red-dim)}

.lb-dot{
  width:10px;height:10px;flex-shrink:0;
}
.lb-name{
  flex:1;min-width:0;
  font-family:'Space Grotesk',sans-serif;
  font-size:0.78rem;font-weight:700;
  text-transform:uppercase;letter-spacing:-0.01em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.lb-pts{
  font-family:'Space Grotesk',sans-serif;
  font-size:0.95rem;font-weight:700;
  flex-shrink:0;
}
.lb-gap{
  font-size:0.5rem;font-weight:700;
  letter-spacing:0.08em;
  color:var(--on-40);
  flex-shrink:0;
  text-align:right;
  min-width:36px;
}
.lb-gap.lead{color:var(--red-dim)}

.lb-footer{
  padding:14px 16px;
  background:var(--surface-low);
  border-top:1px solid var(--on-08);
  flex-shrink:0;
}
.lb-footer-label{
  font-size:0.45rem;font-weight:900;
  letter-spacing:0.2em;text-transform:uppercase;
  color:var(--blue);margin-bottom:4px;
}
.lb-footer-val{
  font-family:'Space Grotesk',sans-serif;
  font-size:0.85rem;font-weight:700;
  text-transform:uppercase;letter-spacing:-0.01em;
}

/* ── CAR LABELS on track ─────── */
.car-label{
  position:absolute;
  display:flex;align-items:center;gap:4px;
  transform:translate(-50%,-50%);
  pointer-events:none;
  white-space:nowrap;
}
.car-dot{
  width:11px;height:11px;
  flex-shrink:0;
}
.car-dot.leader-dot{
  width:13px;height:13px;
  box-shadow:0 0 0 2px rgba(255,180,168,0.4);
}
.car-name{
  font-family:'Space Grotesk',sans-serif;
  font-size:0.5rem;font-weight:900;
  text-transform:uppercase;letter-spacing:0.06em;
  color:var(--on);
  text-shadow:0 0 6px rgba(0,0,0,0.9), 0 0 12px rgba(0,0,0,0.8);
}
.car-pts-badge{
  font-size:0.42rem;font-weight:700;
  color:var(--on-60);
  text-shadow:0 0 6px rgba(0,0,0,0.9);
}

/* ── PULSE RING for leader ─────── */
@keyframes pulseRing{
  0%{transform:translate(-50%,-50%) scale(1);opacity:0.6}
  100%{transform:translate(-50%,-50%) scale(2.2);opacity:0}
}
.pulse-ring{
  position:absolute;
  width:13px;height:13px;
  border:2px solid var(--red-dim);
  border-radius:50%;
  animation:pulseRing 1.4s ease-out infinite;
  pointer-events:none;
  transform-origin:center;
}
</style>
</head>
<body>

<div class="wrap">

  <!-- ── LEFT: CIRCUIT ── -->
  <section class="circuit-panel">
    <div class="circuit-header">
      <div>
        <div class="circuit-title">
          <span id="gp-label">Japanese GP:</span><br/>
          Live Track Position
        </div>
        <div class="live-tag">
          <div class="live-dot"></div>
          <span class="live-label" id="live-label">Live Results · Round 3</span>
        </div>
      </div>
      <div class="race-info">
        <div class="round" id="round-label">ROUND 3 OF 24</div>
        <div class="gp-name" id="venue-name">Suzuka Circuit</div>
        <div class="venue" id="venue-country">Suzuka, Japan</div>
      </div>
    </div>

    <div class="circuit-map">
      <div id="circuit-svg-wrap">
        <!-- Track image — will be set by JS as inline SVG -->
        <div id="track-img-container"></div>
        <!-- Cars overlaid absolutely -->
        <div id="cars-container" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none"></div>
      </div>
    </div>
  </section>

  <!-- ── RIGHT: LEADERBOARD ── -->
  <aside class="leaderboard-panel">
    <div class="lb-header">
      <div class="lb-title">Live Ranking</div>
      <div id="lb-race-name" style="font-size:0.5rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--on-40)">GD · R3</div>
    </div>
    <div class="lb-list" id="lb-list"></div>
    <div class="lb-footer">
      <div class="lb-footer-label">Leader</div>
      <div class="lb-footer-val" id="lb-leader-name">—</div>
    </div>
  </aside>

</div>

<script>
// ── SUZUKA CENTERLINE WAYPOINTS (viewBox 121 × 85) ──────────────────────────
// Sampled along the track centerline; cars are interpolated between these
const SUZUKA_TRACK = [
  [8,60],[12,55],[15,48],[15,38],[16,30],[18,22],[22,16],[28,11],
  [36,10],[42,12],[46,18],[47,25],[48,32],[50,38],[52,43],[53,48],
  [54,50],[56,50],[60,49],[63,47],[66,43],[69,39],[71,37],[74,36],
  [76,36],[79,37],[81,40],[83,43],[85,47],[86,50],[86,54],[84,57],
  [91,60],[96,63],[99,65],[103,65],[107,67],[110,70],[112,73],
  [112,75],[109,76],[105,75],[100,73],[95,70],[90,66],
  [85,62],[80,59],[74,56],[68,54],[62,52],[56,51],[52,48],
  [50,43],[49,38],[48,33],[47,27],[44,22],[40,17],[35,13],
  [28,11],[20,13],[14,17],[10,24],[8,34],[7,44],[8,54],[8,60]
];

// ── PLAYER COLORS ─────────────────────────────────────────────────────────────
const PLAYER_COLORS = [
  '#e10600','#3192fc','#4ade80','#f59e0b','#c084fc',
  '#fb923c','#22d3ee','#a3e635','#f472b6','#94a3b8','#fbbf24'
];

// ── INTERPOLATE point along track (t = 0..1) ─────────────────────────────────
function trackPoint(waypoints, t) {
  const pts = waypoints;
  const n = pts.length - 1;
  const f = ((t % 1) + 1) % 1;
  const raw = f * n;
  const i = Math.floor(raw);
  const frac = raw - i;
  const a = pts[i], b = pts[(i+1) % pts.length];
  return [a[0] + (b[0]-a[0])*frac, a[1] + (b[1]-a[1])*frac];
}

// ── MAP SVG COORDS to container pixel coords ──────────────────────────────────
function svgToPixel(svgX, svgY, containerW, containerH, svgW, svgH, padding) {
  // The SVG image is rendered inside the container, centered, with padding
  const scaleX = (containerW - padding*2) / svgW;
  const scaleY = (containerH - padding*2) / svgH;
  const scale = Math.min(scaleX, scaleY);
  const imgW = svgW * scale, imgH = svgH * scale;
  const offsetX = (containerW - imgW) / 2;
  const offsetY = (containerH - imgH) / 2;
  return [offsetX + svgX * scale, offsetY + svgY * scale];
}

// ── CALCULATE track positions from pts (proportional gap) ────────────────────
function calcPositions(players) {
  const sorted = [...players].sort((a,b) => b.race_points - a.race_points);
  const maxPts = sorted[0].race_points;
  const minPts = sorted[sorted.length-1].race_points;
  const range = Math.max(maxPts - minPts, 1);
  // Leader at t=0.02, others fall behind proportionally; max lag = 0.40 of circuit
  const positions = {};
  sorted.forEach(p => {
    const lag = ((maxPts - p.race_points) / range) * 0.40;
    positions[p.user_name] = ((0.02 - lag) + 1) % 1;
  });
  return positions;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(results) {
  if (!results || results.length === 0) return;

  const sorted = [...results].sort((a,b) => b.race_points - a.race_points);
  const positions = calcPositions(results);

  // ── Leaderboard ──
  const lb = document.getElementById('lb-list');
  lb.innerHTML = '';
  sorted.forEach((p, i) => {
    const gap = i === 0 ? 0 : sorted[0].race_points - p.race_points;
    const color = PLAYER_COLORS[i] || '#888';
    const row = document.createElement('div');
    row.className = 'lb-row' + (i===0?' leader':'');
    row.innerHTML = `
      <div class="lb-rank">${String(i+1).padStart(2,'0')}</div>
      <div class="lb-dot" style="background:${color}"></div>
      <div class="lb-name">${p.user_name}</div>
      <div class="lb-pts" style="color:${i===0?'var(--red-dim)':'var(--on)'}">${p.race_points}</div>
      <div class="lb-gap ${i===0?'lead':''}">${i===0?'LEAD':'-'+gap}</div>
    `;
    lb.appendChild(row);
  });
  document.getElementById('lb-leader-name').textContent = sorted[0].user_name;

  // ── Cars on circuit ──
  const container = document.getElementById('cars-container');
  container.innerHTML = '';
  const cW = container.offsetWidth, cH = container.offsetHeight;
  if (!cW || !cH) return;

  const SVG_W = 121, SVG_H = 85, PAD = 24;

  sorted.forEach((p, i) => {
    const color = PLAYER_COLORS[i] || '#888';
    const t = positions[p.user_name];
    const [sx, sy] = trackPoint(SUZUKA_TRACK, t);
    const [px, py] = svgToPixel(sx, sy, cW, cH, SVG_W, SVG_H, PAD);
    const isLeader = i === 0;

    if (isLeader) {
      const ring = document.createElement('div');
      ring.className = 'pulse-ring';
      ring.style.cssText = `left:${px}px;top:${py}px;border-color:${color}`;
      container.appendChild(ring);
    }

    const el = document.createElement('div');
    el.className = 'car-label';
    el.style.cssText = `left:${px}px;top:${py}px`;

    const initials = p.user_name.split(' ').map(w=>w[0]).join('').substring(0,3).toUpperCase();
    const shortName = p.user_name.split(' ')[0].substring(0,6).toUpperCase();

    el.innerHTML = `
      <div class="${isLeader?'car-dot leader-dot':'car-dot'}" style="background:${color};border-radius:50%"></div>
      <div>
        <div class="car-name" style="color:${color}">${shortName}</div>
        <div class="car-pts-badge">${p.race_points} pts</div>
      </div>
    `;
    container.appendChild(el);
  });
}

// ── LOAD TRACK IMAGE + DATA ───────────────────────────────────────────────────
async function init() {
  // Load circuit image
  try {
    const svgRes = await fetch('images/circuits/round-03_suzuka.svg');
    if (svgRes.ok) {
      const svgText = await svgRes.text();
      const container = document.getElementById('track-img-container');
      // Re-color SVG to match design (make track visible as subtle outline)
      const recolored = svgText
        .replace(/fill="#15151E"/g, 'fill="#353534"')
        .replace(/width="121"/, 'width="100%"')
        .replace(/height="85"/, 'height="100%"');
      container.innerHTML = recolored;
      const svg = container.querySelector('svg');
      if (svg) {
        svg.style.cssText = 'max-width:75%;max-height:75%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.35;filter:drop-shadow(0 0 20px rgba(225,6,0,0.12))';
      }
    }
  } catch(e) { console.warn('Track image not loaded:', e); }

  // Load live results
  try {
    const res = await fetch('live/results.json?_=' + Date.now());
    if (res.ok) {
      const data = await res.json();
      if (data && data.length > 0) {
        // Update header info
        const first = data[0];
        const round = first.race_number;
        document.getElementById('gp-label').textContent = first.race_name.replace(' Grand Prix','') + ' GP:';
        document.getElementById('live-label').textContent = `Live Results · Round ${round}`;
        document.getElementById('round-label').textContent = `ROUND ${round} OF 24`;
        document.getElementById('lb-race-name').textContent = `GD · R${round}`;
        render(data);
      }
    }
  } catch(e) {
    console.warn('Live data not available, using sample data');
    // Sample data for preview
    render([
      {user_name:'Fabio Mucci',      race_points:70, race_number:3, race_name:'Japanese Grand Prix'},
      {user_name:'Vinicius Agostini',race_points:61, race_number:3, race_name:'Japanese Grand Prix'},
      {user_name:'Liberio Junior',   race_points:58, race_number:3, race_name:'Japanese Grand Prix'},
      {user_name:'Raphael Stein',    race_points:52, race_number:3, race_name:'Japanese Grand Prix'},
      {user_name:'Rafael Dias',      race_points:49, race_number:3, race_name:'Japanese Grand Prix'},
      {user_name:'Eduardo Lima',     race_points:45, race_number:3, race_name:'Japanese Grand Prix'},
      {user_name:'Robson Jardim',    race_points:41, race_number:3, race_name:'Japanese Grand Prix'},
      {user_name:'Priscila Rigotto', race_points:38, race_number:3, race_name:'Japanese Grand Prix'},
      {user_name:'Danilo Iglesias',  race_points:35, race_number:3, race_name:'Japanese Grand Prix'},
      {user_name:'Ricardo Mucci',    race_points:32, race_number:3, race_name:'Japanese Grand Prix'},
      {user_name:'Guilherme F.',     race_points:28, race_number:3, race_name:'Japanese Grand Prix'},
    ]);
  }

  // Re-render on resize
  window.addEventListener('resize', () => {
    // Just re-render cars at new size
    const container = document.getElementById('cars-container');
    if (container.children.length > 0) {
      // Re-trigger render with cached data — simplified: page reload handles resize
    }
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>

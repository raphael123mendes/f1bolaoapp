<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>F1 Bolão — Driver Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
:root{
  --red:#e10600;--red-dim:#ffb4a8;
  --blue:#a6c8ff;--blue-bright:#3192fc;
  --green:#4ade80;--amber:#f59e0b;
  --surface:#131313;--surface-low:#1c1b1b;--surface-mid:#201f1f;
  --surface-high:#2a2a2a;--surface-highest:#353534;
  --on:#e5e2e1;
  --on-60:rgba(229,226,225,0.6);--on-40:rgba(229,226,225,0.4);
  --on-20:rgba(229,226,225,0.2);--on-08:rgba(229,226,225,0.08);
  --outline:#af8781;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--surface);color:var(--on);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
body{min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;font-family:'Material Symbols Outlined';vertical-align:middle}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:50;background:var(--surface);box-shadow:0 20px 40px rgba(0,0,0,0.3)}
.topbar-inner{display:flex;justify-content:space-between;align-items:center;height:56px;padding:0 16px}
.back-btn{background:none;border:none;cursor:pointer;color:var(--red);padding:6px;display:flex;align-items:center;gap:6px;font-family:'Space Grotesk',sans-serif;font-size:0.75rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase}
.topbar-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1rem;letter-spacing:-0.02em;color:var(--red);text-transform:uppercase;font-style:italic}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--on-40);padding:6px;display:flex;align-items:center}

main{flex:1;padding-bottom:80px}

/* ── ENTITY SELECTOR ── */
.filter-bar{display:flex;gap:4px;padding:12px 16px 8px}
.filter-btn{background:var(--surface-high);border:none;color:var(--on-40);font-family:'Inter',sans-serif;font-size:0.6rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;padding:7px 14px;cursor:pointer;transition:all 0.15s}
.filter-btn.active{background:var(--red);color:#fff}

.entity-scroll{display:flex;overflow-x:auto;gap:6px;padding:0 16px 10px;scrollbar-width:none}
.entity-scroll::-webkit-scrollbar{display:none}
.entity-pill{flex-shrink:0;display:flex;align-items:center;gap:6px;background:var(--surface-high);border:none;cursor:pointer;padding:5px 10px 5px 5px;transition:all 0.15s;border-bottom:2px solid transparent;-webkit-tap-highlight-color:transparent}
.entity-pill.active{border-bottom-color:var(--red);background:var(--surface-highest)}

/* FIXED IMAGE BEHAVIOR (PORTRAIT & LANDSCAPE) */
.pill-thumb{
  width:22px;height:22px;object-fit:cover;object-position:top;border-radius:0;flex-shrink:0;
  background:transparent; /* Removed gray background */
  filter: grayscale(80%) opacity(0.6); /* Muted by default */
  transition: filter 0.3s ease, transform 0.2s ease, opacity 0.3s ease;
}
.pill-thumb.car{object-fit:contain;object-position:center}

/* FULL COLOR ON CLICK/TOUCH/HOVER */
.entity-pill:hover .pill-thumb,
.entity-pill:active .pill-thumb,
.entity-pill.active .pill-thumb {
  filter: grayscale(0%) opacity(1) !important;
  transform: scale(1.1);
}

.pill-name{font-size:0.58rem;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap}
.pill-pts{font-family:'Space Grotesk',sans-serif;font-size:0.65rem;font-weight:700;color:var(--on-40);margin-left:2px}

/* ── HERO ── */
.hero{position:relative;margin:0 16px;overflow:hidden;background:var(--surface-low)}
.hero-img-wrap{
  position:relative;height:260px;overflow:hidden;
  background:transparent !important; /* Forces removal of gray layer */
}
.hero-portrait{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;filter: none !important;}
.hero-car{width:100%;height:100%;object-fit:contain;object-position:center;padding:16px 24px;display:block;filter: none !important;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,var(--surface-low) 0%,transparent 20%)}

.hero-info{padding:16px 16px 20px;border-left:4px solid var(--red)}
.hero-name{font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:900;text-transform:uppercase;letter-spacing:-0.03em;line-height:1}

/* ── BENTO & CHARTS ── */
.bento{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 16px 0}
.bento-card{background:var(--surface-low);padding:14px}
.bento-full{grid-column:1/-1}

@media(orientation:landscape){
  body{overflow:hidden;height:100dvh}
  main{padding-bottom:0;height:calc(100dvh - 56px);display:flex;flex-direction:row}
  .landscape-sidebar{width:200px;flex-shrink:0;background:var(--surface-low);overflow-y:auto;border-right:1px solid var(--on-08)}
  .landscape-charts{flex:1;overflow-y:auto;padding:12px 16px}
}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--surface);display:flex;height:60px;border-top:1px solid var(--on-08)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-decoration:none;color:var(--on-40);font-size:0.6rem;font-weight:700;text-transform:uppercase}
.nav-item.active{color:var(--red)}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <button class="back-btn" onclick="history.back()"><span class="material-symbols-outlined">arrow_back</span>Market</button>
    <div class="topbar-title">F1 BOLÃO '26</div>
    <button class="icon-btn"><span class="material-symbols-outlined">settings</span></button>
  </div>
</header>

<main id="main-content">
  <div class="portrait-only" id="portrait-wrap">
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('Driver',this)">Drivers</button>
      <button class="filter-btn" onclick="setFilter('Constructor',this)">Constructors</button>
    </div>
    <div class="entity-scroll" id="entity-scroll"></div>

    <div class="hero" id="hero">
      <div class="hero-img-wrap">
        <img id="hero-img" src="" alt="" class="hero-portrait"/>
        <div class="hero-overlay"></div>
      </div>
      <div class="hero-info">
        <div class="hero-name" id="hero-name">Select Entity</div>
        <div id="hero-stats-container" style="margin-top:10px; font-size: 0.8rem; color: var(--on-40)">
          Season Points: <span id="hero-pts" style="color:var(--on)">-</span>
        </div>
      </div>
    </div>
  </div>

  <div class="landscape-only" id="landscape-wrap" style="display:none; width:100%;">
    <div class="landscape-sidebar" id="ls-sidebar">
      </div>
    <div class="landscape-charts" id="ls-content">
       <h2 id="ls-title" style="text-transform:uppercase; font-family:'Space Grotesk'"></h2>
       <p style="color:var(--on-40)">Analytics content goes here...</p>
    </div>
  </div>
</main>

<nav class="bottom-nav">
  <a class="nav-item" href="#"><span class="material-symbols-outlined">leaderboard</span><span>Standings</span></a>
  <a class="nav-item active" href="#"><span class="material-symbols-outlined">monetization_on</span><span>Market</span></a>
</nav>

<script>
let ENTITY_DATA = {};
let ENTITY_ORDER = [];
let selectedEntity = "Max Verstappen"; // Default
let activeFilter = 'all';

// Mock Data Build (Replace with your actual fetch logic)
function buildMockData() {
    const names = ["Max Verstappen", "Lando Norris", "Charles Leclerc", "Mercedes", "Ferrari", "Red Bull Racing"];
    names.forEach(n => {
        const isCon = n === "Mercedes" || n === "Ferrari" || n === "Red Bull Racing";
        ENTITY_DATA[n] = {
            type: isCon ? 'Constructor' : 'Driver',
            total_pts: Math.floor(Math.random() * 100),
            img: isCon ? `images/cars/${n.toLowerCase().replace(/ /g,'_')}.webp` : `images/portraits/${n.toLowerCase().replace(/ /g,'_')}.png`
        };
        ENTITY_ORDER.push(n);
    });
}

function buildSelector() {
    const list = ENTITY_ORDER.filter(n => activeFilter === 'all' || ENTITY_DATA[n].type === activeFilter);
    
    // Update Portrait Scroll
    const scroll = document.getElementById('entity-scroll');
    scroll.innerHTML = list.map(name => {
        const d = ENTITY_DATA[name];
        return `<button class="entity-pill ${name===selectedEntity?'active':''}" onclick="selectEntity('${name}')">
            <img class="pill-thumb ${d.type==='Constructor'?'car':''}" src="${d.img}" />
            <span class="pill-name">${name.split(' ').pop()}</span>
            <span class="pill-pts">${d.total_pts}</span>
        </button>`;
    }).join('');

    // Update Landscape Sidebar
    const sidebar = document.getElementById('ls-sidebar');
    sidebar.innerHTML = list.map(name => {
        const d = ENTITY_DATA[name];
        return `<button class="entity-pill ${name===selectedEntity?'active':''}" onclick="selectEntity('${name}')" style="width:100%; border-bottom:1px solid var(--on-08)">
            <img class="pill-thumb ${d.type==='Constructor'?'car':''}" src="${d.img}" />
            <span class="pill-name">${name}</span>
        </button>`;
    }).join('');
}

function selectEntity(name) {
    selectedEntity = name;
    const d = ENTITY_DATA[name];
    
    // Update UI
    document.getElementById('hero-name').textContent = name;
    document.getElementById('hero-pts').textContent = d.total_pts;
    const img = document.getElementById('hero-img');
    img.src = d.img;
    img.className = d.type === 'Constructor' ? 'hero-car' : 'hero-portrait';
    
    // Landscape Title
    const lsTitle = document.getElementById('ls-title');
    if(lsTitle) lsTitle.textContent = name;

    buildSelector();
}

function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    buildSelector();
}

function handleOrientation() {
    const isLandscape = window.innerWidth > window.innerHeight;
    document.getElementById('portrait-wrap').style.display = isLandscape ? 'none' : 'block';
    document.getElementById('landscape-wrap').style.display = isLandscape ? 'flex' : 'none';
}

window.addEventListener('resize', handleOrientation);
document.addEventListener('DOMContentLoaded', () => {
    buildMockData();
    handleOrientation();
    selectEntity(selectedEntity);
});
</script>
</body>
</html>

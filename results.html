<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Full Grid Sweep - Race Results</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  :root {
    --red: #e10600;
    --red-dim: #ffb4a8;
    --blue: #a6c8ff;
    --blue-bright: #3192fc;
    --green: #4ade80;
    --surface: #131313;
    --surface-low: #1c1b1b;
    --surface-mid: #201f1f;
    --surface-high: #2a2a2a;
    --surface-highest: #353534;
    --on-surface: #e5e2e1;
    --on-50: rgba(229,226,225,0.5);
    --on-30: rgba(229,226,225,0.3);
    --on-15: rgba(229,226,225,0.15);
    --on-08: rgba(229,226,225,0.08);
    --outline: #af8781;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--surface); color: var(--on-surface); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
  body { min-height: 100dvh; display: flex; flex-direction: column; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; font-family: 'Material Symbols Outlined'; }

  /* ── TOP BAR ── */
  .topbar { position: sticky; top: 0; z-index: 50; background: var(--surface); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
  .topbar-inner { display: flex; justify-content: space-between; align-items: center; height: 56px; padding: 0 20px; }
  .brand { font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: 1.35rem; letter-spacing: -0.04em; color: var(--red); text-transform: uppercase; }
  .brand span { color: var(--on-surface); opacity: 0.4; }
  .icon-btn { background: none; border: none; cursor: pointer; color: var(--on-surface); padding: 6px; display: flex; align-items: center; }
  .icon-btn:hover { color: var(--red-dim); }

  main { flex: 1; padding-bottom: 80px; }

  /* ── ROUND SWITCHER ── */
  .round-switcher {
    display: flex; align-items: center; gap: 0;
    overflow-x: auto; padding: 12px 16px; gap: 6px;
    scrollbar-width: none;
  }
  .round-switcher::-webkit-scrollbar { display: none; }
  .round-btn {
    flex-shrink: 0;
    background: var(--surface-high); border: none; color: var(--on-50);
    font-family: 'Inter', sans-serif; font-size: 0.62rem; font-weight: 800;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 6px 12px; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
    border-bottom: 2px solid transparent;
  }
  .round-btn:hover { color: var(--on-surface); background: var(--surface-highest); }
  .round-btn.active { color: var(--red); background: var(--surface-highest); border-bottom: 2px solid var(--red); }
  .round-btn.cancelled { color: var(--on-30); text-decoration: line-through; cursor: not-allowed; }

  /* ── RACE HEADER ── */
  .race-header {
    position: relative; overflow: hidden;
    border-left: 3px solid var(--red);
    background: var(--surface-low);
    margin: 0 16px 4px; padding: 20px 20px 20px;
    min-height: 110px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .race-header-bg {
    position: absolute; right: -10px; top: 50%; transform: translateY(-50%);
    width: 160px; height: 160px; opacity: 0.12;
    pointer-events: none;
  }
  .race-header-bg img { width: 100%; height: 100%; object-fit: contain; filter: invert(1); }
  .race-flag-label {
    font-size: 0.58rem; font-weight: 900; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--red); margin-bottom: 6px;
  }
  .race-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.6rem; font-weight: 700; line-height: 1.0;
    letter-spacing: -0.03em; text-transform: uppercase;
  }
  .race-meta {
    font-size: 0.58rem; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--on-30); margin-top: 6px;
  }
  .race-live-badge {
    display: inline-block; padding: 2px 8px;
    border: 1px solid var(--red); color: var(--red);
    font-size: 0.55rem; font-weight: 900; letter-spacing: 0.16em; text-transform: uppercase;
    margin-top: 8px; align-self: flex-start;
  }
  .sprint-badge {
    display: inline-block; padding: 2px 8px; margin-left: 6px;
    border: 1px solid var(--blue); color: var(--blue);
    font-size: 0.55rem; font-weight: 900; letter-spacing: 0.16em; text-transform: uppercase;
  }

  /* ── TABLE ── */
  .table-section { margin: 12px 16px 0; }
  .table-header {
    display: grid; grid-template-columns: 36px 1fr 52px 58px 70px;
    gap: 8px; padding: 8px 12px 6px;
    font-size: 0.52rem; font-weight: 900; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--on-30);
    border-bottom: 1px solid var(--on-08);
  }
  .table-header span:nth-child(3),
  .table-header span:nth-child(4),
  .table-header span:nth-child(5) { text-align: right; }

  .player-row {
    display: grid; grid-template-columns: 36px 1fr 52px 58px 70px;
    gap: 8px; padding: 12px 12px;
    align-items: center;
    border-bottom: 1px solid var(--on-08);
    background: var(--surface-low);
    transition: background 0.1s;
    animation: fadeIn 0.25s ease both;
  }
  .player-row:hover { background: var(--surface-high); }
  .player-row.rank-1 { background: rgba(225,6,0,0.06); }

  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

  .p-rank {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.1rem; font-weight: 700; color: var(--on-30); line-height: 1;
  }
  .player-row.rank-1 .p-rank { color: var(--red); }
  .player-row.rank-2 .p-rank { color: var(--outline); }
  .player-row.rank-3 .p-rank { color: #8B7355; }

  .p-info { overflow: hidden; }
  .p-name { font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .p-team { font-size: 0.56rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--on-50); margin-top: 2px; }
  .p-card {
    display: inline-block; margin-top: 4px;
    background: rgba(225,6,0,0.12); border: 1px solid rgba(225,6,0,0.25);
    color: var(--red); font-size: 0.48rem; font-weight: 800;
    letter-spacing: 0.1em; text-transform: uppercase; padding: 1px 5px;
  }

  .p-pts { text-align: right; }
  .p-prize {
    text-align: right;
  }
  .p-prize-val {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.78rem; font-weight: 700; color: var(--green); line-height: 1;
  }
  .p-prize-val.no-prize { color: var(--on-30); font-size: 0.6rem; }
  .p-pts-race {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem; font-weight: 700; color: var(--on-surface); line-height: 1;
  }
  .p-pts-season {
    font-size: 0.52rem; font-weight: 700; color: var(--on-30);
    text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px;
  }

  .p-budget { text-align: right; }
  .p-budget-val { font-family: 'Space Grotesk', sans-serif; font-size: 0.82rem; font-weight: 700; }
  .p-budget-delta { display: flex; align-items: center; justify-content: flex-end; gap: 2px; font-size: 0.52rem; font-weight: 800; margin-top: 2px; }
  .delta-pos { color: var(--green); }
  .delta-neg { color: var(--red-dim); }
  .delta-zero { color: var(--on-30); }

  /* ── LIVE MODE TABLE ── */
  .table-section.live-mode .table-header,
  .table-section.live-mode .player-row {
    grid-template-columns: 36px 1fr 60px;
  }
  .p-picks {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-top: 4px; font-size: 0.58rem; font-weight: 700;
    letter-spacing: 0.04em; text-transform: uppercase; color: var(--on-50);
  }
  .p-picks sup { font-size: 0.65em; margin-left: 1px; }
  .p-picks .pick-c, .p-picks .pick-mc { color: var(--red); }

  .round-btn.live-btn {
    background: rgba(225,6,0,0.12); border-bottom: 2px solid var(--red);
    color: var(--red); position: relative;
  }
  .round-btn.live-btn::before {
    content: ''; display: inline-block;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--red); margin-right: 5px;
    animation: livePulse 1.2s ease-in-out infinite;
    vertical-align: middle;
  }
  .round-btn.live-btn.active { background: rgba(225,6,0,0.2); }
  @keyframes livePulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.4; transform:scale(0.7); } }

  .live-meta {
    font-size: 0.52rem; font-weight: 800; color: var(--red);
    letter-spacing: 0.12em; text-transform: uppercase; margin-top: 4px;
  }
  .refresh-countdown {
    display: inline-block; margin-left: 6px;
    font-size: 0.48rem; font-weight: 600; color: var(--on-30);
  }
  .mvp-section { margin: 24px 16px 0; }
  .mvp-title { font-size: 0.7rem; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase; color: var(--red); margin-bottom: 12px; }
  .mvp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .mvp-card {
    background: var(--surface-low); padding: 14px;
    position: relative; overflow: hidden;
  }
  .mvp-card.driver-card { border-left: 2px solid var(--red); }
  .mvp-card.constructor-card { border-left: 2px solid var(--red); }
  .mvp-card.riser-card { border-left: 2px solid var(--green); }
  .mvp-card.faller-card { border-left: 2px solid var(--red-dim); }

  .mvp-card-label {
    font-size: 0.48rem; font-weight: 900; letter-spacing: 0.18em;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .driver-card .mvp-card-label,
  .constructor-card .mvp-card-label { color: var(--red); }
  .riser-card .mvp-card-label { color: var(--green); }
  .faller-card .mvp-card-label { color: var(--red-dim); }

  .mvp-thumb {
    position: absolute; right: 0; bottom: 0;
    height: 72px; width: 52px;
    object-fit: cover; object-position: top center;
    opacity: 0.35; pointer-events: none;
  }
  .mvp-logo {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    height: 36px; width: 36px; object-fit: contain; opacity: 0.3;
  }

  .mvp-name-row {
    display: flex; align-items: baseline; justify-content: space-between;
    position: relative; z-index: 1; margin-bottom: 4px;
  }
  .mvp-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.05rem; font-weight: 700; line-height: 1.1;
    text-transform: uppercase; letter-spacing: -0.02em;
  }
  .mvp-team-label { font-size: 0.52rem; font-weight: 600; color: var(--on-surface); text-transform: uppercase;
  letter-spacing: 0.1em; position: relative; z-index: 1; }
  .mvp-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.82rem; font-weight: 700; flex-shrink: 0; margin-left: 6px;
  }
  .driver-card .mvp-value,
  .constructor-card .mvp-value { color: var(--on-surface); }
  .riser-card .mvp-value { color: var(--green); }
  .faller-card .mvp-value { color: var(--red-dim); }

  /* ── LIVE INSIGHTS ── */
  .insights-section { margin: 24px 16px 0; }
  .insights-title { font-size: 0.7rem; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase; color: var(--red); margin-bottom: 12px; }
  .insight-tabs {
    display: flex; gap: 6px; margin-bottom: 10px;
    overflow-x: auto; scrollbar-width: none;
  }
  .insight-tabs::-webkit-scrollbar { display: none; }
  .insight-tab {
    flex-shrink: 0;
    background: var(--surface-high); border: none; color: var(--on-50);
    font-family: 'Inter', sans-serif; font-size: 0.6rem; font-weight: 800;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 7px 12px; cursor: pointer; transition: all 0.15s;
  }
  .insight-tab.active { background: rgba(225,6,0,0.15); color: var(--red); }

  .insight-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; background: var(--surface-low);
    border-bottom: 1px solid var(--on-08);
  }
  .insight-row:first-child { border-top-left-radius: 4px; border-top-right-radius: 4px; }
  .insight-row:last-child { border-bottom: none; border-bottom-left-radius: 4px; border-bottom-right-radius: 4px; }
  .insight-pick {
    flex-shrink: 0; width: 44px;
    font-family: 'Space Grotesk', sans-serif; font-size: 0.78rem; font-weight: 800;
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .insight-pick-name {
    flex-shrink: 0; width: 88px;
    font-size: 0.62rem; font-weight: 700; letter-spacing: 0.04em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    color: var(--on-50); text-transform: uppercase;
  }
  .insight-owners {
    flex: 1; display: flex; flex-wrap: wrap; gap: 6px;
    justify-content: flex-end;
  }
  .owner-chip {
    display: flex; align-items: center; gap: 4px;
    background: var(--surface-high); padding: 3px 8px;
    font-size: 0.6rem; font-weight: 700; white-space: nowrap;
  }
  .owner-chip .owner-pts { font-family: 'Space Grotesk', sans-serif; color: var(--red); }
  .owner-chip .owner-pts.neg { color: var(--red-dim); }
  .owner-chip sup { font-size: 0.65em; color: var(--red); margin-left: 1px; }
  .insight-empty {
    padding: 20px 12px; text-align: center;
    color: var(--on-30); font-size: 0.66rem;
    font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    background: var(--surface-low);
  }

  /* ── COMPARE TAB ── */
  .compare-selectors {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  }
  .compare-select {
    flex: 1; background: var(--surface-high); color: var(--on-surface);
    border: none; padding: 8px 10px; font-family: 'Inter', sans-serif;
    font-size: 0.66rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .compare-vs {
    font-family: 'Space Grotesk', sans-serif; font-weight: 900;
    color: var(--on-30); font-size: 0.7rem;
  }
  .compare-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .compare-col { background: var(--surface-low); }
  .compare-col-header {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 8px 10px; border-bottom: 1px solid var(--on-08);
    font-family: 'Space Grotesk', sans-serif;
  }
  .compare-col-total { color: var(--red); font-weight: 800; font-size: 0.85rem; }
  .compare-pick-row {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px; font-size: 0.62rem; font-weight: 700;
    border-bottom: 1px solid var(--on-08);
  }
  .compare-pick-row:last-child { border-bottom: none; }
  .compare-pick-row .insight-pick { width: 40px; font-size: 0.7rem; }
  .compare-pick-row .compare-pick-pts {
    margin-left: auto; font-family: 'Space Grotesk', sans-serif; color: var(--red);
  }
  .compare-pick-row.shared { opacity: 0.4; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    background: var(--surface); box-shadow: 0 -10px 40px rgba(0,0,0,0.25);
    display: flex; height: 60px; border-top: 1px solid var(--on-08);
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; text-decoration: none; color: rgba(166,200,255,0.35);
    font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    transition: color 0.15s; cursor: pointer; background: none; border: none;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-item.active { color: var(--red); border-top: 2px solid var(--red); background: var(--surface-low); }
  .nav-item:hover:not(.active) { color: rgba(166,200,255,0.6); }
  .nav-item .material-symbols-outlined { font-size: 1.3rem; }
  .nav-item.active .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body>

<div id="loading-overlay" style="position:fixed;inset:0;background:#131313;z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px">
  <div style="font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:900;color:#e10600;letter-spacing:-0.02em;text-transform:uppercase">RS F1 BOLÃO  2026</div>
  <div style="width:40px;height:2px;background:#2a2a2a;position:relative;overflow:hidden">
    <div style="position:absolute;top:0;left:-100%;width:100%;height:100%;background:#e10600;animation:loadSlide 1s ease infinite"></div>
  </div>
  <style>@keyframes loadSlide{0%{left:-100%}100%{left:100%}}</style>
</div>
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">Full Grid Sweep - Race Results</div>
    <button class="icon-btn"><span class="material-symbols-outlined">settings</span></button>
  </div>
</header>

<main>
  <!-- ROUND SWITCHER -->
  <div class="round-switcher" id="round-switcher"></div>

  <!-- RACE HEADER -->
  <div class="race-header" id="race-header">
    <div class="race-header-bg" id="circuit-bg">
      <img id="circuit-img" src="" alt="" style="display:none"/>
    </div>
    <div>
      <div class="race-flag-label" id="race-flag-label"></div>
      <div class="race-title" id="race-title"></div>
      <div class="race-meta" id="race-meta"></div>

    <div class="insights-title">Live Insights</div>

      <button class="insight-tab active" data-tab="points">Pick Points</button>
      <button class="insight-tab" data-tab="diff">Differentiators</button>
      <button class="insight-tab" data-tab="compare">Compare Teams</button>
    </div>
    <div id="insights-content"></div>
  </div>

  <!-- WEEKEND MVPs -->
  <div class="mvp-section" id="mvp-section">

<script>
// ── LIVE CONFIG ────────────────────────────────────────────────────────────
const LIVE_BASE = 'live/';                  // folder: live/results.json etc.
const REFRESH_MS = 10 * 60 * 1000;         // 10 minutes
const REFRESH_S  = REFRESH_MS / 1000;

// ── MODULE STATE ───────────────────────────────────────────────────────────
let STATIC_RESULTS, STATIC_PICKS, STATIC_PRICES;
let RESULTS, PICKS, PRICES, RACES, CONFIG;
let isLive = false;
let liveAvailable = false;
let selectedRace = null;
let refreshTimer = null;
let countdownTimer = null;
let countdownSec = REFRESH_S;
let activeInsightTab = 'points';
let compareUserA = null;
let compareUserB = null;

// ── HELPERS ────────────────────────────────────────────────────────────────
async function tryFetch(url) {
  try {
    const r = await fetch(url + '?_=' + Date.now()); // cache-bust
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function loadStatic() {
  const [results, picks, prices, races, config] = await Promise.all([
    tryFetch('results.json'),
    tryFetch('picks.json'),
    tryFetch('prices.json'),
    tryFetch('races.json'),
    tryFetch('config.json'),
  ]);
  if (!results || !races || !config) throw new Error('Failed to load static data files');
  RESULTS = results; PICKS = picks || []; PRICES = prices || []; RACES = races; CONFIG = config;
  STATIC_RESULTS = results; STATIC_PICKS = PICKS; STATIC_PRICES = PRICES;
}

async function loadLive() {
  const [results, picks, prices] = await Promise.all([
    tryFetch(LIVE_BASE + 'results.json'),
    tryFetch(LIVE_BASE + 'picks.json'),
    tryFetch(LIVE_BASE + 'prices.json'),
  ]);
  if (!results || results.length === 0) return false;
  RESULTS = results;
  if (picks)  PICKS  = picks;
  if (prices) PRICES = prices;
  return true;
}

// checkLiveAvailable now reuses loadLive to avoid fetching live/results.json twice
async function checkLiveAvailable() {
  const r = await tryFetch(LIVE_BASE + 'results.json');
  return r !== null && Array.isArray(r) && r.length > 0;
}

function slugify(name) {
  return name.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
}

// ── ROUND SWITCHER ─────────────────────────────────────────────────────────
function buildSwitcher() {
  const el = document.getElementById('round-switcher');
  el.innerHTML = '';

  // Live button — shown only when live data is available
  if (liveAvailable) {
    const liveRaceNum = Math.max(...RESULTS.map(r => r.race_number)); // live race round
    const btn = document.createElement('button');
    btn.className = 'round-btn live-btn' + (isLive ? ' active' : '');
    btn.textContent = 'LIVE';
    btn.title = 'Live race data — refreshes every 10 min';
    btn.onclick = () => enterLiveMode();
    el.appendChild(btn);
  }

  // Static rounds — always derived from static data so live mode doesn't hide past races
  const racedRounds = [...new Set(STATIC_RESULTS.map(r => r.race_number))].sort((a,b) => a-b);
  RACES.forEach(race => {
    const hasData = racedRounds.includes(race.round);
    const btn = document.createElement('button');
    btn.className = 'round-btn' +
      (race.cancelled ? ' cancelled' : '') +
      (!hasData && !race.cancelled ? ' cancelled' : '') +
      (!isLive && race.round === selectedRace ? ' active' : '');
    btn.textContent = `R${String(race.round).padStart(2,'0')}`;
    btn.title = race.race_name + (race.cancelled ? ' — Cancelled' : !hasData ? ' — No data yet' : '');
    if (hasData && !race.cancelled) {
      btn.onclick = () => {
        isLive = false;
        stopRefreshCycle();
        document.getElementById('live-meta').style.display = 'none';
        RESULTS = STATIC_RESULTS; PICKS = STATIC_PICKS; PRICES = STATIC_PRICES;
        selectedRace = race.round;
        render();
      };
    }
    el.appendChild(btn);
  });

  const active = el.querySelector('.active');
  if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

// ── LIVE MODE ENTER / EXIT ─────────────────────────────────────────────────
async function enterLiveMode() {
  isLive = true;
  const ok = await loadLive();
  if (!ok) { isLive = false; return; }
  selectedRace = Math.max(...RESULTS.map(r => r.race_number));
  startRefreshCycle();
  render();
}

function exitLiveMode() {
  isLive = false;
  stopRefreshCycle();
  document.getElementById('live-meta').style.display = 'none';
}

// ── REFRESH CYCLE ──────────────────────────────────────────────────────────
function startRefreshCycle() {
  stopRefreshCycle();
  countdownSec = REFRESH_S;
  updateCountdown();
  countdownTimer = setInterval(() => {
    countdownSec--;
    updateCountdown();
  }, 1000);
  refreshTimer = setInterval(async () => {
    const ok = await loadLive();
    if (ok) {
      selectedRace = Math.max(...RESULTS.map(r => r.race_number));
      render();
    }
    countdownSec = REFRESH_S;
  }, REFRESH_MS);
}

function stopRefreshCycle() {
  clearInterval(refreshTimer);
  clearInterval(countdownTimer);
  refreshTimer = null;
  countdownTimer = null;
}

function updateCountdown() {
  const el = document.getElementById('refresh-countdown');
  if (!el) return;
  const m = Math.floor(countdownSec / 60);
  const s = String(countdownSec % 60).padStart(2, '0');
  el.textContent = `· refresh in ${m}:${s}`;
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  document.getElementById("loading-overlay")?.remove();
  buildSwitcher();

  const raceResults = RESULTS.filter(r => r.race_number === selectedRace)
    .sort((a, b) => a.race_rank - b.race_rank);

  const raceInfo = RACES.find(r => r.round === selectedRace) || {};
  const sample = raceResults[0] || {};

  // Header
  const circuitImg = CIRCUIT_MAP[sample.race_name] || null;
  const bgImg = document.getElementById('circuit-img');
  const bgWrap = document.getElementById('circuit-bg');
  if (circuitImg) {
    bgImg.src = circuitImg; bgImg.style.display = 'block'; bgWrap.style.display = 'block';
  } else {
    bgWrap.style.display = 'none';
  }
  document.getElementById('race-flag-label').textContent =
    `${sample.race_flag || ''} ${raceInfo.location || ''}`;
  document.getElementById('race-title').textContent = sample.race_name || '';
  document.getElementById('race-meta').textContent =
    `${sample.race_date || ''} · ${isLive ? 'Live Standings' : 'Official Classification'}`;

  // Live meta bar
  const liveMeta = document.getElementById('live-meta');
  if (isLive) {
    const now = new Date();
    document.getElementById('live-updated').textContent =
      `Updated ${now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
    liveMeta.style.display = 'block';
  } else {
    liveMeta.style.display = 'none';
  }

  const sprintBadge = document.getElementById('sprint-badge');
  sprintBadge.style.display = raceInfo.sprint_weekend ? 'inline-block' : 'none';

  // Table layout: live mode shows picks instead of prize/budget
  const tableSection = document.getElementById('table-section');
  const tableHeader  = document.getElementById('table-header');
  tableSection.classList.toggle('live-mode', isLive);
  tableHeader.innerHTML = isLive
    ? `<span>RK</span><span>Player / Picks</span><span>GD PTS</span>`
    : `<span>RK</span><span>Player / Team</span><span>Prize</span><span>GD PTS</span><span>Budget</span>`;

  // Player list
  const list = document.getElementById('player-list');
  list.innerHTML = '';
  raceResults.forEach((p, idx) => {
    const hasBudget = p.new_budget != null && p.current_budget != null;
    const delta = hasBudget ? Math.round((p.new_budget - p.current_budget) * 10) / 10 : null;
    const deltaStr = delta == null ? '—' : delta > 0 ? `+$${delta.toFixed(1)}M` : delta < 0 ? `-$${Math.abs(delta).toFixed(1)}M` : '—';
    const deltaClass = delta == null ? 'delta-zero' : delta > 0 ? 'delta-pos' : delta < 0 ? 'delta-neg' : 'delta-zero';
    const deltaIcon = delta == null ? 'remove' : delta > 0 ? 'trending_up' : delta < 0 ? 'trending_down' : 'remove';
    const rankClass = p.race_rank === 1 ? 'rank-1' : p.race_rank === 2 ? 'rank-2' : p.race_rank === 3 ? 'rank-3' : '';
    const hasCard = p.cards_used && p.cards_used.trim();
    const hasPrize = p.race_prize != null && p.race_prize > 0;

    const row = document.createElement('div');
    row.className = `player-row ${rankClass}`;
    row.style.animationDelay = `${idx * 0.03}s`;

    if (isLive) {
      const picksHtml = formatPicksHtml(picksForTeam(p.race_number, p.user_name));
      row.innerHTML = `
      <div class="p-rank">${String(p.race_rank).padStart(2,'0')}</div>
      <div class="p-info">
        <div class="p-name">${p.user_name}</div>
        <div class="p-team">${p.team_name}</div>
        ${picksHtml ? `<div class="p-picks">${picksHtml}</div>` : ''}
        ${hasCard ? `<span class="p-card">${p.cards_used}</span>` : ''}
      </div>
      <div class="p-pts">
        <div class="p-pts-race">${(p.race_points ?? 0).toFixed(0)}</div>
        <div class="p-pts-season">${(p.season_points ?? 0).toFixed(0)} TOT</div>
      </div>`;
    } else {
      row.innerHTML = `
      <div class="p-rank">${String(p.race_rank).padStart(2,'0')}</div>
      <div class="p-info">
        <div class="p-name">${p.user_name}</div>
        <div class="p-team">${p.team_name}</div>
        ${hasCard ? `<span class="p-card">${p.cards_used}</span>` : ''}
      </div>
      <div class="p-prize">
        ${hasPrize
          ? `<div class="p-prize-val">$${p.race_prize.toFixed(1)}</div>`
          : `<div class="p-prize-val no-prize">—</div>`}
      </div>
      <div class="p-pts">
        <div class="p-pts-race">${(p.race_points ?? 0).toFixed(0)}</div>
        <div class="p-pts-season">${(p.season_points ?? 0).toFixed(0)} TOT</div>
      </div>
      <div class="p-budget">
        <div class="p-budget-val">${hasBudget ? `$${p.new_budget.toFixed(1)}M` : '—'}</div>
        <div class="p-budget-delta ${deltaClass}">
          <span class="material-symbols-outlined" style="font-size:0.7rem">${deltaIcon}</span>
          ${deltaStr}
        </div>
      </div>`;
    }
    list.appendChild(row);
  });

  // Live insights vs. weekend MVPs
  document.getElementById('insights-section').style.display = isLive ? 'block' : 'none';
  document.getElementById('mvp-section').style.display = isLive ? 'none' : 'block';
  if (isLive) {
    renderInsights(selectedRace);
  } else {
    renderMVPs(selectedRace);
  }
}

// ── Live picks helpers ──────────────────────────────────────────────────
function picksForTeam(raceNum, userName) {
  return (PICKS || [])
    .filter(pp => pp.race_number === raceNum && pp.user_name === userName)
    .sort((a, b) => {
      const order = x => x.is_megacap ? 0 : x.is_captain ? 1 : x.pick_type === 'Driver' ? 2 : 3;
      return order(a) - order(b);
    });
}

// Fallback TLA lookups for picks.json rows saved before pick_tla was exported.
// Keyed by last word of pick_name (driver last name, or full constructor name).
const DRIVER_TLA = {
  'albon':'ALB', 'lindblad':'LIN', 'sainz':'SAI', 'leclerc':'LEC', 'ocon':'OCO',
  'alonso':'ALO', 'colapinto':'COL', 'bortoleto':'BOR', 'russell':'RUS', 'hadjar':'HAD',
  'antonelli':'ANT', 'stroll':'STR', 'norris':'NOR', 'hamilton':'HAM', 'lawson':'LAW',
  'verstappen':'VER', 'hulkenberg':'HUL', 'bearman':'BEA', 'piastri':'PIA', 'gasly':'GAS',
  'perez':'PER', 'bottas':'BOT',
};
const CONSTRUCTOR_TLA = {
  'alpine':'ALP', 'aston martin':'AM', 'audi':'AUD', 'cadillac':'CAD', 'ferrari':'FER',
  'haas f1 team':'HAA', 'haas':'HAA', 'mclaren':'MCL', 'mercedes':'MER',
  'racing bulls':'RB', 'red bull racing':'RBR', 'williams':'WIL',
};

function lookupTla(pp) {
  if (pp.pick_tla) return pp.pick_tla.toUpperCase();
  const name = (pp.pick_name || '').trim();
  if (pp.pick_type === 'Constructor') {
    return CONSTRUCTOR_TLA[name.toLowerCase()] || name.slice(0, 3).toUpperCase();
  }
  const lastName = name.split(/[\s.]+/).filter(Boolean).pop() || name;
  return DRIVER_TLA[lastName.toLowerCase()] || name.slice(0, 3).toUpperCase();
}

function formatPicksHtml(picks) {
  return picks.map(pp => {
    const tla = lookupTla(pp);
    if (pp.is_megacap) return `<span class="pick-mc">${tla}<sup>MC</sup></span>`;
    if (pp.is_captain)  return `<span class="pick-c">${tla}<sup>C</sup></span>`;
    return `<span class="pick-d">${tla}</span>`;
  }).join('');
}

// ── LIVE INSIGHTS ────────────────────────────────────────────────────────
function shortName(userName) {
  return (userName || '').split(' ')[0];
}

function fmtPts(pts) {
  const v = Math.round(pts || 0);
  return v > 0 ? `+${v}` : `${v}`;
}

// Groups picks by pick_id: { pick_id, pick_name, pick_type, tla, owners: [...] }
function buildPickGroups(raceNum) {
  const groups = {};
  (PICKS || []).filter(p => p.race_number === raceNum).forEach(p => {
    if (!groups[p.pick_id]) {
      groups[p.pick_id] = {
        pick_id:   p.pick_id,
        pick_name: p.pick_name,
        pick_type: p.pick_type,
        tla:       lookupTla(p),
        owners:    [],
      };
    }
    groups[p.pick_id].owners.push({
      user_name:   p.user_name,
      points:      p.pick_points_gd ?? 0,
      is_captain:  p.is_captain,
      is_megacap:  p.is_megacap,
    });
  });
  return Object.values(groups);
}

function ownerChipsHtml(owners) {
  return owners
    .slice()
    .sort((a, b) => b.points - a.points)
    .map(o => {
      const cls = o.points < 0 ? 'neg' : '';
      const tag = o.is_megacap ? '<sup>MC</sup>' : o.is_captain ? '<sup>C</sup>' : '';
      return `<span class="owner-chip">${shortName(o.user_name)}${tag} <span class="owner-pts ${cls}">${fmtPts(o.points)}</span></span>`;
    })
    .join('');
}

function renderInsights(raceNum) {
  renderInsightContent(raceNum);
}

function renderInsightContent(raceNum) {
  const el = document.getElementById('insights-content');
  if (activeInsightTab === 'points') {
    renderPickPointsTab(el, raceNum, false);
  } else if (activeInsightTab === 'diff') {
    renderPickPointsTab(el, raceNum, true);
  } else {
    renderCompareTab(el, raceNum);
  }
}

function renderPickPointsTab(el, raceNum, diffOnly) {
  let groups = buildPickGroups(raceNum);
  if (diffOnly) groups = groups.filter(g => g.owners.length === 1);

  if (groups.length === 0) {
    el.innerHTML = `<div class="insight-empty">${diffOnly ? 'No unique picks this race — everyone owns the same drivers.' : 'No live pick data yet.'}</div>`;
    return;
  }

  groups.sort((a, b) => {
    const maxA = Math.max(...a.owners.map(o => o.points));
    const maxB = Math.max(...b.owners.map(o => o.points));
    return maxB - maxA;
  });

  el.innerHTML = groups.map(g => `
    <div class="insight-row">
      <div class="insight-pick">${g.tla}</div>
      <div class="insight-pick-name">${g.pick_name}</div>
      <div class="insight-owners">${ownerChipsHtml(g.owners)}</div>
    </div>`).join('');
}

function renderCompareTab(el, raceNum) {
  const teams = RESULTS.filter(r => r.race_number === raceNum)
    .sort((a, b) => a.race_rank - b.race_rank);

  if (teams.length < 2) {
    el.innerHTML = `<div class="insight-empty">Not enough teams to compare yet.</div>`;
    return;
  }

  const names = teams.map(t => t.user_name);
  if (!names.includes(compareUserA)) compareUserA = names[0];
  if (!names.includes(compareUserB) || compareUserB === compareUserA) {
    compareUserB = names.find(n => n !== compareUserA) || names[1];
  }

  const options = (selected) => names.map(n =>
    `<option value="${n}" ${n === selected ? 'selected' : ''}>${n}</option>`).join('');

  const picksA = picksForTeam(raceNum, compareUserA);
  const picksB = picksForTeam(raceNum, compareUserB);
  const idsB = new Set(picksB.map(p => p.pick_id));
  const idsA = new Set(picksA.map(p => p.pick_id));

  const totalA = teams.find(t => t.user_name === compareUserA)?.race_points ?? 0;
  const totalB = teams.find(t => t.user_name === compareUserB)?.race_points ?? 0;

  const colHtml = (picks, sharedIds, total, userName) => `
    <div class="compare-col">
      <div class="compare-col-header">
        <span>${shortName(userName)}</span>
        <span class="compare-col-total">${Math.round(total)}</span>
      </div>
      ${picks.slice().sort((a, b) => (b.pick_points_gd ?? 0) - (a.pick_points_gd ?? 0)).map(p => `
        <div class="compare-pick-row ${sharedIds.has(p.pick_id) ? 'shared' : ''}">
          <div class="insight-pick">${lookupTla(p)}</div>
          <div class="compare-pick-pts">${fmtPts(p.pick_points_gd)}</div>
        </div>`).join('')}
    </div>`;

  el.innerHTML = `
    <div class="compare-selectors">
      <select class="compare-select" id="compare-select-a">${options(compareUserA)}</select>
      <span class="compare-vs">VS</span>
      <select class="compare-select" id="compare-select-b">${options(compareUserB)}</select>
    </div>
    <div class="compare-cols">
      ${colHtml(picksA, idsB, totalA, compareUserA)}
      ${colHtml(picksB, idsA, totalB, compareUserB)}
    </div>`;

  document.getElementById('compare-select-a').addEventListener('change', (e) => {
    compareUserA = e.target.value;
    renderCompareTab(el, raceNum);
  });
  document.getElementById('compare-select-b').addEventListener('change', (e) => {
    compareUserB = e.target.value;
    renderCompareTab(el, raceNum);
  });
}

// ── MVPs ───────────────────────────────────────────────────────────────────
function renderMVPs(raceNum) {
  const grid = document.getElementById('mvp-grid');
  grid.innerHTML = '';

  const driverPicks = {};
  PICKS.filter(p => p.race_number === raceNum && p.pick_type === 'Driver').forEach(p => {
    if (!driverPicks[p.pick_name] || p.pick_points_gd > driverPicks[p.pick_name])
      driverPicks[p.pick_name] = p.pick_points_gd;
  });
  const topDriver = Object.entries(driverPicks).sort((a,b) => b[1]-a[1])[0];

  const conPicks = {};
  PICKS.filter(p => p.race_number === raceNum && p.pick_type === 'Constructor').forEach(p => {
    if (!conPicks[p.pick_name] || p.pick_points_gd > conPicks[p.pick_name])
      conPicks[p.pick_name] = p.pick_points_gd;
  });
  const topCon = Object.entries(conPicks).sort((a,b) => b[1]-a[1])[0];

  const racePrices = PRICES.filter(p => p.race_number === raceNum);
  const sorted = [...racePrices].sort((a,b) => b.price_change_pct - a.price_change_pct);
  const riser = sorted[0];
  const faller = sorted[sorted.length - 1];

  function driverSlug(name) {
    if (CONFIG.driver_slug_overrides && CONFIG.driver_slug_overrides[name]) return CONFIG.driver_slug_overrides[name];
    return name.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
  }
  function conSlug(name) {
    if (CONFIG.constructor_slug_overrides && CONFIG.constructor_slug_overrides[name]) return CONFIG.constructor_slug_overrides[name];
    return name.toLowerCase().replace(/\s+/g,'_').replace(/\s*f1\s*team/i,'').replace(/[^a-z0-9_]/g,'').replace(/_+$/,'');
  }

  const cards = [
    topDriver ? { cls:'driver-card', label:'Top Driver', name:topDriver[0], sub:'—', value:`${topDriver[1]} PTS`, img:`images/portraits/${driverSlug(topDriver[0])}.png`, imgCls:'mvp-thumb' } : null,
    topCon    ? { cls:'constructor-card', label:'Top Constructor', name:topCon[0], sub:'', value:`${topCon[1]} PTS`, img:`images/logos/${conSlug(topCon[0])}.webp`, imgCls:'mvp-logo' } : null,
    riser     ? { cls:'riser-card', label:'Market Riser', name:riser.player_name, sub:riser.type.toUpperCase(), value:`+${riser.price_change_pct.toFixed(1)}%`, img:riser.type==='Driver'?`images/portraits/${driverSlug(riser.player_name)}.png`:`images/logos/${conSlug(riser.player_name)}.webp`, imgCls:riser.type==='Driver'?'mvp-thumb':'mvp-logo' } : null,
    faller    ? { cls:'faller-card', label:'Market Faller', name:faller.player_name, sub:faller.type.toUpperCase(), value:`${faller.price_change_pct.toFixed(1)}%`, img:faller.type==='Driver'?`images/portraits/${driverSlug(faller.player_name)}.png`:`images/logos/${conSlug(faller.player_name)}.webp`, imgCls:faller.type==='Driver'?'mvp-thumb':'mvp-logo' } : null,
  ];

  cards.filter(Boolean).forEach(c => {
    const el = document.createElement('div');
    el.className = `mvp-card ${c.cls}`;
    el.innerHTML = `
      <div class="mvp-card-label">${c.label}</div>
      <div class="mvp-name-row">
        <div class="mvp-name">${c.name}</div>
        <span class="mvp-value">${c.value}</span>
      </div>
      ${c.sub ? `<div class="mvp-team-label">${c.sub}</div>` : ''}
      <img class="${c.imgCls}" src="${c.img}" alt="" onerror="this.style.display='none'"/>`;
    grid.appendChild(el);
  });
}

// ── INIT ───────────────────────────────────────────────────────────────────
async function init() {
  try {
    document.getElementById('insight-tabs').addEventListener('click', (e) => {
      const btn = e.target.closest('.insight-tab');
      if (!btn) return;
      activeInsightTab = btn.dataset.tab;
      document.querySelectorAll('.insight-tab').forEach(t => t.classList.toggle('active', t === btn));
      renderInsightContent(selectedRace);
    });

    await loadStatic();
    selectedRace = Math.max(...STATIC_RESULTS.map(r => r.race_number));

    // Try to load live data — loadLive() returns true only if live/results.json
    // is reachable AND non-empty, so checkLiveAvailable is folded in here to
    // avoid fetching the same file twice.
    const liveLoaded = await loadLive();
    liveAvailable = liveLoaded;
    if (liveLoaded) {
      isLive = true;
      selectedRace = Math.max(...RESULTS.map(r => r.race_number));
      startRefreshCycle();
    }

    render();
  } catch(e) {
    console.error('results.html error:', e);
  }
}
document.addEventListener('DOMContentLoaded', init);

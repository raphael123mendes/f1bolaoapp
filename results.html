<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>F1 Bolão — Race Results</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  :root {
    --red: #e10600;
    --red-dim: #ffb4a8;
    --blue: #a6c8ff;
    --blue-bright: #3192fc;
    --green: #4ade80;
    --surface: #131313;
    --surface-low: #1c1b1b;
    --surface-mid: #201f1f;
    --surface-high: #2a2a2a;
    --surface-highest: #353534;
    --on-surface: #e5e2e1;
    --on-50: rgba(229,226,225,0.5);
    --on-30: rgba(229,226,225,0.3);
    --on-15: rgba(229,226,225,0.15);
    --on-08: rgba(229,226,225,0.08);
    --outline: #af8781;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--surface); color: var(--on-surface); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
  body { min-height: 100dvh; display: flex; flex-direction: column; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; font-family: 'Material Symbols Outlined'; }

  /* ── TOP BAR ── */
  .topbar { position: sticky; top: 0; z-index: 50; background: var(--surface); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
  .topbar-inner { display: flex; justify-content: space-between; align-items: center; height: 56px; padding: 0 20px; }
  .brand { font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: 1.35rem; letter-spacing: -0.04em; color: var(--red); text-transform: uppercase; }
  .brand span { color: var(--on-surface); opacity: 0.4; }
  .icon-btn { background: none; border: none; cursor: pointer; color: var(--on-surface); padding: 6px; display: flex; align-items: center; }
  .icon-btn:hover { color: var(--red-dim); }

  main { flex: 1; padding-bottom: 80px; }

  /* ── ROUND SWITCHER ── */
  .round-switcher {
    display: flex; align-items: center; gap: 0;
    overflow-x: auto; padding: 12px 16px; gap: 6px;
    scrollbar-width: none;
  }
  .round-switcher::-webkit-scrollbar { display: none; }
  .round-btn {
    flex-shrink: 0;
    background: var(--surface-high); border: none; color: var(--on-50);
    font-family: 'Inter', sans-serif; font-size: 0.62rem; font-weight: 800;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 6px 12px; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
    border-bottom: 2px solid transparent;
  }
  .round-btn:hover { color: var(--on-surface); background: var(--surface-highest); }
  .round-btn.active { color: var(--red); background: var(--surface-highest); border-bottom: 2px solid var(--red); }
  .round-btn.cancelled { color: var(--on-30); text-decoration: line-through; cursor: not-allowed; }

  /* ── RACE HEADER ── */
  .race-header {
    position: relative; overflow: hidden;
    border-left: 3px solid var(--red);
    background: var(--surface-low);
    margin: 0 16px 4px; padding: 20px 20px 20px;
    min-height: 110px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .race-header-bg {
    position: absolute; right: -10px; top: 50%; transform: translateY(-50%);
    width: 160px; height: 160px; opacity: 0.12;
    pointer-events: none;
  }
  .race-header-bg img { width: 100%; height: 100%; object-fit: contain; filter: invert(1); }
  .race-flag-label {
    font-size: 0.58rem; font-weight: 900; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--red); margin-bottom: 6px;
  }
  .race-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.6rem; font-weight: 700; line-height: 1.0;
    letter-spacing: -0.03em; text-transform: uppercase;
  }
  .race-meta {
    font-size: 0.58rem; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--on-30); margin-top: 6px;
  }
  .race-live-badge {
    display: inline-block; padding: 2px 8px;
    border: 1px solid var(--red); color: var(--red);
    font-size: 0.55rem; font-weight: 900; letter-spacing: 0.16em; text-transform: uppercase;
    margin-top: 8px; align-self: flex-start;
  }
  .sprint-badge {
    display: inline-block; padding: 2px 8px; margin-left: 6px;
    border: 1px solid var(--blue); color: var(--blue);
    font-size: 0.55rem; font-weight: 900; letter-spacing: 0.16em; text-transform: uppercase;
  }

  /* ── TABLE ── */
  .table-section { margin: 12px 16px 0; }
  .table-header {
    display: grid; grid-template-columns: 36px 1fr 52px 58px 70px;
    gap: 8px; padding: 8px 12px 6px;
    font-size: 0.52rem; font-weight: 900; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--on-30);
    border-bottom: 1px solid var(--on-08);
  }
  .table-header span:nth-child(3),
  .table-header span:nth-child(4),
  .table-header span:nth-child(5) { text-align: right; }

  .player-row {
    display: grid; grid-template-columns: 36px 1fr 52px 58px 70px;
    gap: 8px; padding: 12px 12px;
    align-items: center;
    border-bottom: 1px solid var(--on-08);
    background: var(--surface-low);
    transition: background 0.1s;
    animation: fadeIn 0.25s ease both;
  }
  .player-row:hover { background: var(--surface-high); }
  .player-row.rank-1 { background: rgba(225,6,0,0.06); }

  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

  .p-rank {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.1rem; font-weight: 700; color: var(--on-30); line-height: 1;
  }
  .player-row.rank-1 .p-rank { color: var(--red); }
  .player-row.rank-2 .p-rank { color: var(--outline); }
  .player-row.rank-3 .p-rank { color: #8B7355; }

  .p-info { overflow: hidden; }
  .p-name { font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .p-team { font-size: 0.56rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--on-50); margin-top: 2px; }
  .p-card {
    display: inline-block; margin-top: 4px;
    background: rgba(225,6,0,0.12); border: 1px solid rgba(225,6,0,0.25);
    color: var(--red); font-size: 0.48rem; font-weight: 800;
    letter-spacing: 0.1em; text-transform: uppercase; padding: 1px 5px;
  }

  .p-pts { text-align: right; }
  .p-prize {
    text-align: right;
  }
  .p-prize-val {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.78rem; font-weight: 700; color: var(--green); line-height: 1;
  }
  .p-prize-val.no-prize { color: var(--on-30); font-size: 0.6rem; }
  .p-pts-race {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem; font-weight: 700; color: var(--red); line-height: 1;
  }
  .player-row:not(.rank-1) .p-pts-race { color: var(--on-surface); }
  .p-pts-season {
    font-size: 0.52rem; font-weight: 700; color: var(--on-30);
    text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px;
  }

  .p-budget { text-align: right; }
  .p-budget-val { font-family: 'Space Grotesk', sans-serif; font-size: 0.82rem; font-weight: 700; }
  .p-budget-delta { display: flex; align-items: center; justify-content: flex-end; gap: 2px; font-size: 0.52rem; font-weight: 800; margin-top: 2px; }
  .delta-pos { color: var(--green); }
  .delta-neg { color: var(--red-dim); }
  .delta-zero { color: var(--on-30); }

  .round-btn.live-btn {
    background: rgba(225,6,0,0.12); border-bottom: 2px solid var(--red);
    color: var(--red); position: relative;
  }
  .round-btn.live-btn::before {
    content: ''; display: inline-block;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--red); margin-right: 5px;
    animation: livePulse 1.2s ease-in-out infinite;
    vertical-align: middle;
  }
  .round-btn.live-btn.active { background: rgba(225,6,0,0.2); }
  @keyframes livePulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.4; transform:scale(0.7); } }

  .live-meta {
    font-size: 0.52rem; font-weight: 800; color: var(--red);
    letter-spacing: 0.12em; text-transform: uppercase; margin-top: 4px;
  }
  .refresh-countdown {
    display: inline-block; margin-left: 6px;
    font-size: 0.48rem; font-weight: 600; color: var(--on-30);
  }
  .mvp-section { margin: 24px 16px 0; }
  .mvp-title { font-size: 0.7rem; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase; color: var(--red); margin-bottom: 12px; }
  .mvp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .mvp-card {
    background: var(--surface-low); padding: 14px;
    position: relative; overflow: hidden;
  }
  .mvp-card.driver-card { border-left: 2px solid var(--red); }
  .mvp-card.constructor-card { border-left: 2px solid var(--red); }
  .mvp-card.riser-card { border-left: 2px solid var(--green); }
  .mvp-card.faller-card { border-left: 2px solid var(--red-dim); }

  .mvp-card-label {
    font-size: 0.48rem; font-weight: 900; letter-spacing: 0.18em;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .driver-card .mvp-card-label,
  .constructor-card .mvp-card-label { color: var(--red); }
  .riser-card .mvp-card-label { color: var(--green); }
  .faller-card .mvp-card-label { color: var(--red-dim); }

  .mvp-thumb {
    position: absolute; right: 0; bottom: 0;
    height: 72px; width: 52px;
    object-fit: cover; object-position: top center;
    opacity: 0.35; pointer-events: none;
  }
  .mvp-logo {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    height: 36px; width: 36px; object-fit: contain; opacity: 0.3;
  }

  .mvp-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.05rem; font-weight: 700; line-height: 1.1;
    text-transform: uppercase; letter-spacing: -0.02em;
    position: relative; z-index: 1;
  }
  .mvp-sub {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 8px; position: relative; z-index: 1;
  }
  .mvp-team-label { font-size: 0.52rem; font-weight: 600; color: var(--on-30); text-transform: uppercase; letter-spacing: 0.1em; }
  .mvp-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem; font-weight: 700;
  }
  .driver-card .mvp-value,
  .constructor-card .mvp-value { color: var(--red); }
  .riser-card .mvp-value { color: var(--green); }
  .faller-card .mvp-value { color: var(--red-dim); }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    background: var(--surface); box-shadow: 0 -10px 40px rgba(0,0,0,0.25);
    display: flex; height: 60px; border-top: 1px solid var(--on-08);
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; text-decoration: none; color: rgba(166,200,255,0.35);
    font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    transition: color 0.15s; cursor: pointer; background: none; border: none;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-item.active { color: var(--red); border-top: 2px solid var(--red); background: var(--surface-low); }
  .nav-item:hover:not(.active) { color: rgba(166,200,255,0.6); }
  .nav-item .material-symbols-outlined { font-size: 1.3rem; }
  .nav-item.active .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body>

<div id="loading-overlay" style="position:fixed;inset:0;background:#131313;z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px">
  <div style="font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:900;color:#e10600;letter-spacing:-0.02em;text-transform:uppercase">F1 Bolão</div>
  <div style="width:40px;height:2px;background:#2a2a2a;position:relative;overflow:hidden">
    <div style="position:absolute;top:0;left:-100%;width:100%;height:100%;background:#e10600;animation:loadSlide 1s ease infinite"></div>
  </div>
  <style>@keyframes loadSlide{0%{left:-100%}100%{left:100%}}</style>
</div>
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">F1<span> / </span>Bolão</div>
    <button class="icon-btn"><span class="material-symbols-outlined">settings</span></button>
  </div>
</header>

<main>
  <!-- ROUND SWITCHER -->
  <div class="round-switcher" id="round-switcher"></div>

  <!-- RACE HEADER -->
  <div class="race-header" id="race-header">
    <div class="race-header-bg" id="circuit-bg">
      <img id="circuit-img" src="" alt="" style="display:none"/>
    </div>
    <div>
      <div class="race-flag-label" id="race-flag-label"></div>
      <div class="race-title" id="race-title"></div>
      <div class="race-meta" id="race-meta"></div>
      <div class="live-meta" id="live-meta" style="display:none">
        ● Live · <span id="live-updated"></span>
        <span class="refresh-countdown" id="refresh-countdown"></span>
      </div>
    </div>
    <div>
      <span class="race-live-badge" id="race-live-badge">League Live</span>
      <span class="sprint-badge" id="sprint-badge" style="display:none">Sprint Weekend</span>
    </div>
  </div>

  <!-- PLAYER TABLE -->
  <div class="table-section">
    <div class="table-header">
      <span>RK</span><span>Player / Team</span><span>Prize</span><span>GD PTS</span><span>Budget</span>
    </div>
    <div id="player-list"></div>
  </div>

  <!-- WEEKEND MVPs -->
  <div class="mvp-section">
    <div class="mvp-title">Weekend MVPs &amp; Market Shifters</div>
    <div class="mvp-grid" id="mvp-grid"></div>
  </div>
</main>

<nav class="bottom-nav">
  <a class="nav-item" href="index.html">
    <span class="material-symbols-outlined">leaderboard</span><span>Standings</span>
  </a>
  <a class="nav-item active" href="results.html">
    <span class="material-symbols-outlined">flag</span><span>Results</span>
  </a>
  <a class="nav-item" href="market.html">
    <span class="material-symbols-outlined">monetization_on</span><span>Market</span>
  </a>
  <a class="nav-item" href="race.html">
    <span class="material-symbols-outlined">sports_motorsports</span><span>Race</span>
  </a>
</nav>

<script>
// ── LIVE CONFIG ────────────────────────────────────────────────────────────
const LIVE_BASE = 'live/';                  // folder: live/results.json etc.
const REFRESH_MS = 10 * 60 * 1000;         // 10 minutes
const REFRESH_S  = REFRESH_MS / 1000;

// ── MODULE STATE ───────────────────────────────────────────────────────────
let RESULTS, PICKS, PRICES, RACES, CONFIG;
let isLive = false;
let liveAvailable = false;
let selectedRace = null;
let refreshTimer = null;
let countdownTimer = null;
let countdownSec = REFRESH_S;

// ── HELPERS ────────────────────────────────────────────────────────────────
async function tryFetch(url) {
  try {
    const r = await fetch(url + '?_=' + Date.now()); // cache-bust
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function loadStatic() {
  const [results, picks, prices, races, config] = await Promise.all([
    fetch('results.json').then(r => r.json()),
    fetch('picks.json').then(r => r.json()),
    fetch('prices.json').then(r => r.json()),
    fetch('races.json').then(r => r.json()),
    fetch('config.json').then(r => r.json()),
  ]);
  RESULTS = results; PICKS = picks; PRICES = prices; RACES = races; CONFIG = config;
}

async function loadLive() {
  const [results, picks, prices] = await Promise.all([
    tryFetch(LIVE_BASE + 'results.json'),
    tryFetch(LIVE_BASE + 'picks.json'),
    tryFetch(LIVE_BASE + 'prices.json'),
  ]);
  if (!results) return false;
  RESULTS = results;
  if (picks)  PICKS  = picks;
  if (prices) PRICES = prices;
  return true;
}

async function checkLiveAvailable() {
  const r = await tryFetch(LIVE_BASE + 'results.json');
  return r !== null && r.length > 0;
}

// ── CIRCUIT IMAGE MAP ──────────────────────────────────────────────────────
const CIRCUIT_MAP = {
  'Australian Grand Prix': null,
  'Chinese Grand Prix': 'images/circuits/round-04_shanghai.svg',
  'Japanese Grand Prix': 'images/circuits/round-03_suzuka.svg',
  'Bahrain Grand Prix': 'images/circuits/round-01_sakhir.svg',
  'Saudi Arabian Grand Prix': 'images/circuits/round-02_jeddah.svg',
  'Miami Grand Prix': 'images/circuits/round-05_miami.svg',
  'Canadian Grand Prix': 'images/circuits/round-10_montreal.svg',
  'Monaco Grand Prix': 'images/circuits/round-07_montecarlo.svg',
  'Barcelona-Catalunya Grand Prix': 'images/circuits/round-08_catalunya.svg',
  'Austrian Grand Prix': 'images/circuits/round-11_spielberg.svg',
  'British Grand Prix': 'images/circuits/round-12_silverstone.svg',
  'Belgian Grand Prix': 'images/circuits/round-13_spa.svg',
  'Hungarian Grand Prix': 'images/circuits/round-14_hungaroring.svg',
  'Dutch Grand Prix': 'images/circuits/round-15_zandvoort.svg',
  'Italian Grand Prix': 'images/circuits/round-16_monza.svg',
  'Spanish Grand Prix': 'images/circuits/round-09_madring.svg',
  'Azerbaijan Grand Prix': 'images/circuits/round-17_baku.svg',
  'Singapore Grand Prix': 'images/circuits/round-18_singapore.svg',
  'United States Grand Prix': 'images/circuits/round-19_austin.svg',
  'Mexico City Grand Prix': 'images/circuits/round-20_mexicocity.svg',
  'São Paulo Grand Prix': 'images/circuits/round-21_interlagos.svg',
  'Las Vegas Grand Prix': 'images/circuits/round-22_lasvegas.svg',
  'Qatar Grand Prix': 'images/circuits/round-23_lusail.svg',
  'Abu Dhabi Grand Prix': 'images/circuits/round-24_yasmarinacircuit.svg',
};

function slugify(name) {
  return name.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
}

// ── ROUND SWITCHER ─────────────────────────────────────────────────────────
function buildSwitcher() {
  const el = document.getElementById('round-switcher');
  el.innerHTML = '';

  // Live button — shown only when live data is available
  if (liveAvailable) {
    const liveRaceNum = Math.max(...RESULTS.map(r => r.race_number)); // live race round
    const btn = document.createElement('button');
    btn.className = 'round-btn live-btn' + (isLive ? ' active' : '');
    btn.textContent = 'LIVE';
    btn.title = 'Live race data — refreshes every 10 min';
    btn.onclick = () => enterLiveMode();
    el.appendChild(btn);
  }

  // Static rounds
  const racedRounds = [...new Set(RESULTS.map(r => r.race_number))].sort((a,b) => a-b);
  RACES.forEach(race => {
    const hasData = racedRounds.includes(race.round);
    const btn = document.createElement('button');
    btn.className = 'round-btn' +
      (race.cancelled ? ' cancelled' : '') +
      (!hasData && !race.cancelled ? ' cancelled' : '') +
      (!isLive && race.round === selectedRace ? ' active' : '');
    btn.textContent = `R${String(race.round).padStart(2,'0')}`;
    btn.title = race.race_name + (race.cancelled ? ' — Cancelled' : !hasData ? ' — No data yet' : '');
    if (hasData && !race.cancelled) {
      btn.onclick = () => { exitLiveMode(); selectedRace = race.round; render(); };
    }
    el.appendChild(btn);
  });

  const active = el.querySelector('.active');
  if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

// ── LIVE MODE ENTER / EXIT ─────────────────────────────────────────────────
async function enterLiveMode() {
  isLive = true;
  const ok = await loadLive();
  if (!ok) { isLive = false; return; }
  selectedRace = Math.max(...RESULTS.map(r => r.race_number));
  startRefreshCycle();
  render();
}

function exitLiveMode() {
  isLive = false;
  stopRefreshCycle();
  document.getElementById('live-meta').style.display = 'none';
}

// ── REFRESH CYCLE ──────────────────────────────────────────────────────────
function startRefreshCycle() {
  stopRefreshCycle();
  countdownSec = REFRESH_S;
  updateCountdown();
  countdownTimer = setInterval(() => {
    countdownSec--;
    updateCountdown();
  }, 1000);
  refreshTimer = setInterval(async () => {
    const ok = await loadLive();
    if (ok) {
      selectedRace = Math.max(...RESULTS.map(r => r.race_number));
      render();
    }
    countdownSec = REFRESH_S;
  }, REFRESH_MS);
}

function stopRefreshCycle() {
  clearInterval(refreshTimer);
  clearInterval(countdownTimer);
  refreshTimer = null;
  countdownTimer = null;
}

function updateCountdown() {
  const el = document.getElementById('refresh-countdown');
  if (!el) return;
  const m = Math.floor(countdownSec / 60);
  const s = String(countdownSec % 60).padStart(2, '0');
  el.textContent = `· refresh in ${m}:${s}`;
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  document.getElementById("loading-overlay")?.remove();
  buildSwitcher();

  const raceResults = RESULTS.filter(r => r.race_number === selectedRace)
    .sort((a, b) => a.race_rank - b.race_rank);

  const raceInfo = RACES.find(r => r.round === selectedRace) || {};
  const sample = raceResults[0] || {};

  // Header
  const circuitImg = CIRCUIT_MAP[sample.race_name] || null;
  const bgImg = document.getElementById('circuit-img');
  const bgWrap = document.getElementById('circuit-bg');
  if (circuitImg) {
    bgImg.src = circuitImg; bgImg.style.display = 'block'; bgWrap.style.display = 'block';
  } else {
    bgWrap.style.display = 'none';
  }
  document.getElementById('race-flag-label').textContent =
    `${sample.race_flag || ''} ${raceInfo.location || ''}`;
  document.getElementById('race-title').textContent = sample.race_name || '';
  document.getElementById('race-meta').textContent =
    `${sample.race_date || ''} · ${isLive ? 'Live Standings' : 'Official Classification'}`;

  // Live meta bar
  const liveMeta = document.getElementById('live-meta');
  if (isLive) {
    const now = new Date();
    document.getElementById('live-updated').textContent =
      `Updated ${now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
    liveMeta.style.display = 'block';
  } else {
    liveMeta.style.display = 'none';
  }

  const sprintBadge = document.getElementById('sprint-badge');
  sprintBadge.style.display = raceInfo.sprint_weekend ? 'inline-block' : 'none';

  // Player list
  const list = document.getElementById('player-list');
  list.innerHTML = '';
  raceResults.forEach((p, idx) => {
    const delta = Math.round((p.new_budget - p.current_budget) * 10) / 10;
    const deltaStr = delta > 0 ? `+$${delta.toFixed(1)}M` : delta < 0 ? `-$${Math.abs(delta).toFixed(1)}M` : '—';
    const deltaClass = delta > 0 ? 'delta-pos' : delta < 0 ? 'delta-neg' : 'delta-zero';
    const deltaIcon = delta > 0 ? 'trending_up' : delta < 0 ? 'trending_down' : 'remove';
    const rankClass = p.race_rank === 1 ? 'rank-1' : p.race_rank === 2 ? 'rank-2' : p.race_rank === 3 ? 'rank-3' : '';
    const hasCard = p.cards_used && p.cards_used.trim();
    const hasPrize = p.race_prize && p.race_prize > 0;

    const row = document.createElement('div');
    row.className = `player-row ${rankClass}`;
    row.style.animationDelay = `${idx * 0.03}s`;
    row.innerHTML = `
      <div class="p-rank">${String(p.race_rank).padStart(2,'0')}</div>
      <div class="p-info">
        <div class="p-name">${p.user_name}</div>
        <div class="p-team">${p.team_name}</div>
        ${hasCard ? `<span class="p-card">${p.cards_used}</span>` : ''}
      </div>
      <div class="p-prize">
        ${hasPrize
          ? `<div class="p-prize-val">$${p.race_prize.toFixed(1)}</div>`
          : `<div class="p-prize-val no-prize">—</div>`}
      </div>
      <div class="p-pts">
        <div class="p-pts-race">${p.race_points.toFixed(0)}</div>
        <div class="p-pts-season">${p.season_points.toFixed(0)} TOT</div>
      </div>
      <div class="p-budget">
        <div class="p-budget-val">$${p.new_budget.toFixed(1)}M</div>
        <div class="p-budget-delta ${deltaClass}">
          <span class="material-symbols-outlined" style="font-size:0.7rem">${deltaIcon}</span>
          ${deltaStr}
        </div>
      </div>`;
    list.appendChild(row);
  });

  renderMVPs(selectedRace);
}

// ── MVPs ───────────────────────────────────────────────────────────────────
function renderMVPs(raceNum) {
  const grid = document.getElementById('mvp-grid');
  grid.innerHTML = '';

  const driverPicks = {};
  PICKS.filter(p => p.race_number === raceNum && p.pick_type === 'Driver').forEach(p => {
    if (!driverPicks[p.pick_name] || p.pick_points_gd > driverPicks[p.pick_name])
      driverPicks[p.pick_name] = p.pick_points_gd;
  });
  const topDriver = Object.entries(driverPicks).sort((a,b) => b[1]-a[1])[0];

  const conPicks = {};
  PICKS.filter(p => p.race_number === raceNum && p.pick_type === 'Constructor').forEach(p => {
    if (!conPicks[p.pick_name] || p.pick_points_gd > conPicks[p.pick_name])
      conPicks[p.pick_name] = p.pick_points_gd;
  });
  const topCon = Object.entries(conPicks).sort((a,b) => b[1]-a[1])[0];

  const racePrices = PRICES.filter(p => p.race_number === raceNum);
  const sorted = [...racePrices].sort((a,b) => b.price_change_pct - a.price_change_pct);
  const riser = sorted[0];
  const faller = sorted[sorted.length - 1];

  function driverSlug(name) {
    if (CONFIG.driver_slug_overrides && CONFIG.driver_slug_overrides[name]) return CONFIG.driver_slug_overrides[name];
    return name.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
  }
  function conSlug(name) {
    if (CONFIG.constructor_slug_overrides && CONFIG.constructor_slug_overrides[name]) return CONFIG.constructor_slug_overrides[name];
    return name.toLowerCase().replace(/\s+/g,'_').replace(/\s*f1\s*team/i,'').replace(/[^a-z0-9_]/g,'').replace(/_+$/,'');
  }

  const cards = [
    topDriver ? { cls:'driver-card', label:'Top Driver', name:topDriver[0], sub:'—', value:`${topDriver[1]} PTS`, img:`images/portraits/${driverSlug(topDriver[0])}.png`, imgCls:'mvp-thumb' } : null,
    topCon    ? { cls:'constructor-card', label:'Top Constructor', name:topCon[0], sub:'', value:`${topCon[1]} PTS`, img:`images/logos/${conSlug(topCon[0])}.webp`, imgCls:'mvp-logo' } : null,
    riser     ? { cls:'riser-card', label:'Market Riser', name:riser.player_name, sub:riser.type.toUpperCase(), value:`+${riser.price_change_pct.toFixed(1)}%`, img:riser.type==='Driver'?`images/portraits/${driverSlug(riser.player_name)}.png`:`images/logos/${conSlug(riser.player_name)}.webp`, imgCls:riser.type==='Driver'?'mvp-thumb':'mvp-logo' } : null,
    faller    ? { cls:'faller-card', label:'Market Faller', name:faller.player_name, sub:faller.type.toUpperCase(), value:`${faller.price_change_pct.toFixed(1)}%`, img:faller.type==='Driver'?`images/portraits/${driverSlug(faller.player_name)}.png`:`images/logos/${conSlug(faller.player_name)}.webp`, imgCls:faller.type==='Driver'?'mvp-thumb':'mvp-logo' } : null,
  ];

  cards.filter(Boolean).forEach(c => {
    const el = document.createElement('div');
    el.className = `mvp-card ${c.cls}`;
    el.innerHTML = `
      <div class="mvp-card-label">${c.label}</div>
      <div class="mvp-name">${c.name}</div>
      <div class="mvp-sub">
        <span class="mvp-team-label">${c.sub}</span>
        <span class="mvp-value">${c.value}</span>
      </div>
      <img class="${c.imgCls}" src="${c.img}" alt="" onerror="this.style.display='none'"/>`;
    grid.appendChild(el);
  });
}

// ── INIT ───────────────────────────────────────────────────────────────────
async function init() {
  try {
    await loadStatic();
    const racedRounds = [...new Set(RESULTS.map(r => r.race_number))].sort((a,b) => a-b);
    selectedRace = Math.max(...racedRounds);

    // Check if live data exists — if so show the LIVE button and auto-enter live mode
    liveAvailable = await checkLiveAvailable();
    if (liveAvailable) {
      isLive = true;
      await loadLive();
      selectedRace = Math.max(...RESULTS.map(r => r.race_number));
      startRefreshCycle();
    }

    render();
  } catch(e) {
    console.error('results.html error:', e);
  }
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
